<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Aniversariantes — Clínica AMA</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/pos-tratamento.css">
</head>
<body>
  <script>
    window.__SUPABASE_URL__ = 'https://mtqdpjhhqzvuklnlfpvi.supabase.co';
    window.__SUPABASE_ANON__ = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10cWRwamhocXp2dWtsbmxmcHZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2Nzg0MjIsImV4cCI6MjA5NDI1NDQyMn0.pNA_AwaFDoT7ReinDMB6Sz0RT_gMZO2IwbAKOq5Ypzw';
  </script>
  <div class="shell">
    <nav id="crm-nav" class="crm-nav"></nav>
    <main class="crm-main">
      <div class="page-layout">
        <div class="page-header">
          <h1 class="page-title">Aniversariantes</h1>
        </div>

        <!-- 4 KPIs -->
        <div class="kpi-row kpi-row--aniv">
          <div class="kpi-card kpi-card--featured kpi-card--aniv-hoje">
            <span class="kpi-card__label">Hoje</span>
            <div id="kpi-hoje"></div>
          </div>
          <div class="kpi-card">
            <span class="kpi-card__label">Selecionados (dia)</span>
            <span class="kpi-card__value" id="kpi-selecionados">—</span>
            <span class="kpi-card__sub" id="kpi-selecionados-data"></span>
          </div>
          <div class="kpi-card">
            <span class="kpi-card__label">Este Mês</span>
            <span class="kpi-card__value" id="kpi-mes">—</span>
            <div class="kpi-dots-row" id="kpi-mes-sub"></div>
          </div>
          <div class="kpi-card">
            <span class="kpi-card__label">Classe A no Mês</span>
            <span class="kpi-card__value kpi-card__value--green" id="kpi-a-mes">—</span>
            <span class="kpi-card__sub">prioridade máxima</span>
          </div>
        </div>

        <div id="template-bar-aniv"></div>

        <!-- Calendar + List split -->
        <div class="aniv-layout">
          <!-- Left: calendar -->
          <div class="aniv-cal-panel">
            <div class="cal-header">
              <button class="cal-nav-btn" id="cal-prev">&#8249;</button>
              <span class="cal-month-label" id="cal-month-label"></span>
              <button class="cal-nav-btn" id="cal-next">&#8250;</button>
            </div>
            <div class="cal-weekdays">
              <span>DOM</span><span>SEG</span><span>TER</span>
              <span>QUA</span><span>QUI</span><span>SEX</span><span>SÁB</span>
            </div>
            <div class="aniv-calendar" id="aniv-calendar"></div>
            <div class="cal-legend">
              <span><span class="cal-dot" style="background:#1E8449"></span> Classe A</span>
              <span><span class="cal-dot" style="background:#1A5276"></span> Classe B</span>
              <span><span class="cal-dot" style="background:#6B6A64"></span> Classe C</span>
            </div>
          </div>

          <!-- Right: patient list -->
          <div class="aniv-list-panel">
            <div class="aniv-list-title" id="aniv-list-title">Selecione um dia</div>
            <div id="aniv-list-header"></div>
            <div id="aniv-lista"></div>
            <div id="btn-marcar-wrap" class="btn-marcar-wrap hidden"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/pos-tratamento/nav.js"></script>
  <script type="module" src="/js/pos-tratamento/aniversariantes.js"></script>
</body>
</html>
