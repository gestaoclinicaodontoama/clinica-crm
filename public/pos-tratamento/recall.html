  <title>Recall — Clínica AMA</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/pos-tratamento.css">
</head>
<body>

    <main class="crm-main">
      <div class="page-layout">
        <div class="page-header">
          <div>
            <h1 class="page-title">Recall</h1>
            <p class="page-subtitle">Pacientes A e B sem visita há 180+ dias e sem agenda futura</p>
          </div>
          <button class="btn btn--ghost btn--sm btn--sync" id="btn-sync-clinicorp" onclick="window._syncClinicorp()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
            <span id="btn-sync-label">Atualizar dados</span>
          </button>
        </div>

        <div class="kpi-row">
          <div class="kpi-card">
            <span class="kpi-card__label">Total A+B recall</span>
            <span class="kpi-card__value" id="kpi-total">—</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-card__label">180–359 dias</span>
            <span class="kpi-card__value kpi-card__value--amber" id="kpi-180">—</span>
          </div>
          <div class="kpi-card">
            <span class="kpi-card__label">360+ dias</span>
            <span class="kpi-card__value kpi-card__value--red" id="kpi-360">—</span>
          </div>
        </div>

        <div id="template-bar-recall"></div>

        <div class="controls-row">
          <div class="tabs">
            <button class="tab tab--active" data-tab="180">180–359 dias</button>
            <button class="tab" data-tab="360">360+ dias</button>
          </div>
          <div class="chip-group">
            <button class="chip chip--active" data-classe="A">Classe A</button>
            <button class="chip chip--active" data-classe="B">Classe B</button>
          </div>
        </div>

        <div class="progress-row">
          <span id="progress-label" class="progress-label"></span>
        </div>

        <div id="recall-table-wrap"></div>
        <div id="pagination" class="pagination"></div>
        <div id="btn-marcar-recall-wrap" class="btn-marcar-wrap"></div>
      </div>
    </main>

  <script src="/js/shared-nav.js" data-active="recall"></script>
  <script type="module" src="/js/pos-tratamento/recall.js"></script>

</html>
