<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesquisa de Satisfação -- CRM AMA</title>
<link rel="icon" href="/favicon.ico">
<style>
  :root { --bg:#0f1115; --bg2:#171a21; --bg3:#1f2330; --border:#2a2f3d; --text:#e8eaf0; --muted:#8b93a7; --accent:#4f8ef7; --green:#22c55e; --red:#ef4444; --yellow:#f59e0b; }
  [data-theme="light"] { --bg:#f5f6f8; --bg2:#fff; --bg3:#eef0f4; --border:#dde1e8; --text:#1a1d26; --muted:#6b7280; --accent:#2563eb; --green:#16a34a; --red:#dc2626; --yellow:#d97706; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  /* shared-nav move este <main> para dentro do .crm-content (flex:1) que ele
     cria; então main é só um bloco normal com padding/largura — NÃO mexer no
     .crm-content (a versão atual do shared-nav o usa como host do conteúdo). */
  main { padding:24px; max-width:1280px; min-width:0; }
  h1 { font-size:20px; margin-bottom:4px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:16px; }
  h2 { font-size:14px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); margin:22px 0 10px; }
  .topo { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .filtros { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .filtros label { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:5px; }
  input[type="date"] { background:var(--bg2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 8px; font-size:13px; font-family:inherit; }
  .btn { background:var(--bg2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 14px; font-size:13px; cursor:pointer; }
  .btn:hover { border-color:var(--accent); }
  .btn:disabled { opacity:.5; cursor:default; }
  .btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; }
  .card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:12px; }
  .card .num { font-size:22px; font-weight:700; }
  .card .lbl { font-size:11.5px; color:var(--muted); margin-top:2px; }
  .card.falhas .num { color:var(--red); }
  table { width:100%; border-collapse:collapse; background:var(--bg2); border:1px solid var(--border); border-radius:10px; overflow:hidden; font-size:13px; }
  th, td { padding:9px 10px; text-align:left; border-bottom:1px solid var(--border); }
  th { background:var(--bg3); color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  .tabela-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .pill { display:inline-block; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:600; white-space:nowrap; }
  .pill.enviado { background:rgba(79,142,247,.15); color:var(--accent); }
  .pill.respondido { background:rgba(34,197,94,.15); color:var(--green); }
  .pill.falhou { background:rgba(239,68,68,.15); color:var(--red); }
  .comentario { max-width:260px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
  .comentario.aberto { white-space:normal; max-width:340px; }
  .notas { color:var(--muted); font-size:11.5px; white-space:nowrap; }
  .estado { color:var(--muted); font-size:13px; padding:20px; text-align:center; }
  .erro { color:var(--red); }
  .toast { position:fixed; bottom:20px; right:20px; background:var(--bg2); border:1px solid var(--border); color:var(--text); padding:10px 16px; border-radius:8px; font-size:13px; box-shadow:0 4px 16px rgba(0,0,0,.3); opacity:0; transform:translateY(10px); transition:.2s; pointer-events:none; z-index:999; }
  .toast.show { opacity:1; transform:translateY(0); }
  @media (max-width:760px){
    main { padding:12px; padding-bottom:84px; }
    .cards { grid-template-columns:repeat(2,1fr); gap:8px; }
    .card .num { font-size:20px; }
    table { font-size:11px; } th, td { padding:6px 5px; }
  }
</style>
</head>
<body>
<script src="/js/shared-nav.js" data-active="pesquisa-satisfacao"></script>
<main>
  <div class="topo">
    <div>
      <h1>Pesquisa de Satisfação</h1>
      <div class="sub" id="sub">carregando…</div>
    </div>
    <div class="filtros">
      <label>De <input type="date" id="f-from"></label>
      <label>Até <input type="date" id="f-to"></label>
      <button class="btn" id="btn-filtrar">Filtrar</button>
      <button class="btn btn-primary" id="btn-disparar">Disparar pesquisas de hoje</button>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <h2>Envios <span style="text-transform:none;font-weight:400;color:var(--muted);font-size:11.5px">período selecionado</span></h2>
  <div class="tabela-wrap"><table id="tabela"><tr><td class="estado">carregando…</td></tr></table></div>
</main>
<div class="toast" id="toast"></div>
<script src="/js/pesquisa-satisfacao/api.js"></script>
<script src="/js/pesquisa-satisfacao/main.js"></script>
</body>
</html>
