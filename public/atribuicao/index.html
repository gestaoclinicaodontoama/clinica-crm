<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Atribuição — CRM AMA</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
  :root[data-theme="dark"] {
    --bg: #0f1117; --bg2: #181b24; --bg3: #1e2230; --border: #2a2f42;
    --text: #e8eaf0; --muted: #6b7280; --accent: #4f8ef7; --accent-hover: #3a78e0;
    --green: #22c55e; --yellow: #f59e0b; --red: #ef4444; --orange: #f97316;
  }
  :root[data-theme="light"] {
    --bg: #f7f8fa; --bg2: #ffffff; --bg3: #f1f3f7; --border: #e3e6ed;
    --text: #1a1d29; --muted: #6b7280; --accent: #3b82f6; --accent-hover: #2563eb;
    --green: #16a34a; --yellow: #d97706; --red: #dc2626; --orange: #ea580c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  </style>
  <script src="/js/shared-nav.js" data-active="atribuicao" defer></script>
</head>
<body class="crm-shell">
<main style="flex:1;padding:28px 32px;overflow-y:auto;max-width:1100px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
    <h1 style="font-size:20px;font-weight:700;margin:0">Atribuição por Anúncio</h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <select id="fil-periodo" onchange="onPeriodoChange()" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px">
        <option value="7">Últimos 7 dias</option>
        <option value="30" selected>Últimos 30 dias</option>
        <option value="90">Últimos 90 dias</option>
        <option value="0">Período personalizado</option>
      </select>
      <input type="date" id="fil-desde" style="display:none;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px" onchange="aplicarFiltro()">
      <input type="date" id="fil-ate" style="display:none;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px" onchange="aplicarFiltro()">
    </div>
  </div>

  <div id="cards-resumo" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px"></div>

  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:28px">
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:600px">
        <thead>
          <tr style="border-bottom:1px solid var(--border);background:var(--bg3)">
            <th style="padding:10px 14px;text-align:left;font-weight:600;color:var(--muted)">Fonte</th>
            <th style="padding:10px 14px;text-align:left;font-weight:600;color:var(--muted)">Anúncio / Campanha</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)">Leads</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)">Agendados</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)">Compareceu</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)">Fechados</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)">Receita</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)">Conv.</th>
          </tr>
        </thead>
        <tbody id="tabela-atribuicao"></tbody>
      </table>
    </div>
  </div>

  <!-- CPA / ROAS / Discrepância (Meta Ads) -->
  <div style="margin-bottom:10px;display:flex;align-items:center;gap:8px">
    <h2 style="font-size:16px;font-weight:700;margin:0">💰 Custo, Retorno e Discrepância</h2>
    <span style="font-size:11.5px;color:var(--muted)">gasto e conversas do Meta cruzados com seus leads reais</span>
  </div>
  <div id="insights-aviso" style="display:none;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.4);border-radius:8px;padding:10px 14px;font-size:12.5px;margin-bottom:14px"></div>
  <div id="insights-cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:14px"></div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:28px">
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:760px">
        <thead>
          <tr style="border-bottom:1px solid var(--border);background:var(--bg3)">
            <th style="padding:10px 14px;text-align:left;font-weight:600;color:var(--muted)">Anúncio</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)">Gasto</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)">Conversas Meta</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)">Leads CRM</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)" title="Conversas que o Meta reporta menos os leads que realmente entraram no CRM">Discrep.</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)">Fechou</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)">Receita</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)" title="Custo por fechamento">CPA</th>
            <th style="padding:10px 14px;text-align:right;font-weight:600;color:var(--muted)" title="Receita / Gasto">ROAS</th>
          </tr>
        </thead>
        <tbody id="tabela-insights"></tbody>
      </table>
    </div>
  </div>

  <div id="catalogo-wrap" style="display:none">
    <details style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px">
      <summary style="font-weight:700;font-size:14px;cursor:pointer;user-select:none">Catálogo de Anúncios</summary>
      <div style="margin-top:14px;display:flex;flex-direction:column;gap:12px">
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
          <div>
            <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:3px">Fonte</label>
            <select id="cat-fonte" style="padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px">
              <option value="meta">Meta</option><option value="google">Google</option>
            </select>
          </div>
          <div style="flex:1;min-width:140px">
            <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:3px">Chave (ad_id ou utm_campaign)</label>
            <input id="cat-chave" style="width:100%;box-sizing:border-box;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px">
          </div>
          <div style="flex:1;min-width:140px">
            <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:3px">Nome legível</label>
            <input id="cat-nome" style="width:100%;box-sizing:border-box;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px">
          </div>
          <div style="flex:1;min-width:120px">
            <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:3px">Descrição (opcional)</label>
            <input id="cat-desc" style="width:100%;box-sizing:border-box;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px">
          </div>
          <button onclick="adicionarAnuncio()" style="padding:6px 14px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap">Adicionar</button>
        </div>
        <div id="catalogo-lista" style="display:flex;flex-direction:column;gap:6px"></div>
      </div>
    </details>
  </div>
</main>

<script>
const _tkKey = [...Object.keys(localStorage)].find(k=>k.startsWith('sb-')&&k.endsWith('-auth-token'));
const _tkn = _tkKey ? (JSON.parse(localStorage.getItem(_tkKey)||'{}')?.access_token || '') : '';
const _api = (path, opts={}) => fetch(path, {
  headers: { 'Authorization': 'Bearer ' + _tkn, 'Content-Type': 'application/json', ...(opts.headers||{}) },
  ...opts
}).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
const _esc = s => String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const _brl = v => 'R$ ' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0});

function onPeriodoChange() {
  const custom = document.getElementById('fil-periodo').value === '0';
  document.getElementById('fil-desde').style.display = custom ? '' : 'none';
  document.getElementById('fil-ate').style.display = custom ? '' : 'none';
  if (!custom) aplicarFiltro();
}

function getFiltroParams() {
  const p = document.getElementById('fil-periodo').value;
  if (p === '0') {
    const desde = document.getElementById('fil-desde').value;
    const ate = document.getElementById('fil-ate').value;
    return (desde && ate) ? 'desde=' + desde + '&ate=' + ate : 'periodo=30';
  }
  return 'periodo=' + p;
}

let _isAdmin = null;
async function _checkAdmin() {
  if (_isAdmin !== null) return _isAdmin;
  try {
    const me = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + _tkn }});
    if (me.ok) { const p = await me.json(); _isAdmin = Array.isArray(p?.roles) && p.roles.includes('admin'); }
    else _isAdmin = false;
  } catch(_) { _isAdmin = false; }
  return _isAdmin;
}

async function aplicarFiltro() {
  try {
    const [dados, isAdmin] = await Promise.all([
      _api('/api/atribuicao?' + getFiltroParams()),
      _checkAdmin()
    ]);
    renderCards(dados.totais || {});
    renderTabela(dados.grupos || [], dados.truncado);
    if (isAdmin) {
      document.getElementById('catalogo-wrap').style.display = '';
      _api('/api/anuncios').then(catalog => renderCatalogo(Array.isArray(catalog) ? catalog : [])).catch(() => {});
    }
  } catch(e) { console.error('atribuicao:', e); }
  carregarInsights();
}

function _brl2(v) { return v == null ? '—' : 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); }

async function carregarInsights() {
  const aviso = document.getElementById('insights-aviso');
  const cards = document.getElementById('insights-cards');
  const tbody = document.getElementById('tabela-insights');
  aviso.style.display = 'none';
  try {
    const d = await _api('/api/meta-insights?' + getFiltroParams());
    if (d.sem_token) { aviso.style.display=''; aviso.style.color='#92400e'; aviso.textContent='⚠️ META_ACCESS_TOKEN não configurado no servidor.'; cards.innerHTML=''; tbody.innerHTML=''; return; }
    if (d.erro_meta) { aviso.style.display=''; aviso.style.color='#b91c1c'; aviso.textContent='⚠️ Meta: ' + d.erro_meta + ' (o token do servidor precisa de permissão ads_read nesta conta de anúncios).'; cards.innerHTML=''; tbody.innerHTML=''; return; }
    const t = d.totais || {};
    cards.innerHTML = [
      ['Gasto total', _brl2(t.spend), '💸'],
      ['Conversas (Meta)', t.meta_conversas||0, '💬'],
      ['Leads no CRM', t.leads||0, '👤'],
      ['Receita', _brl2(t.receita), '💰'],
      ['ROAS geral', t.roas!=null ? t.roas.toFixed(1)+'x' : '—', '📈'],
    ].map(([l,v]) => `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px"><div style="font-size:11.5px;color:var(--muted);margin-bottom:5px">${_esc(l)}</div><div style="font-size:19px;font-weight:700">${_esc(String(v))}</div></div>`).join('');
    tbody.innerHTML = (d.anuncios||[]).map(a => {
      const nome = a.ad_name || a.campaign_name || a.ad_id;
      const disc = a.discrepancia;
      const discCor = disc > 0 ? 'var(--red)' : disc < 0 ? 'var(--green)' : 'var(--muted)';
      const discTxt = disc > 0 ? '+' + disc : String(disc);
      const roasCor = a.roas == null ? 'var(--muted)' : a.roas >= 3 ? 'var(--green)' : a.roas >= 1 ? 'var(--text)' : 'var(--red)';
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:10px 14px;font-weight:500;max-width:240px"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${_esc(nome)}">${_esc(nome)}</div></td>
        <td style="padding:10px 14px;text-align:right">${_esc(_brl2(a.spend))}</td>
        <td style="padding:10px 14px;text-align:right">${a.meta_conversas}</td>
        <td style="padding:10px 14px;text-align:right">${a.leads}</td>
        <td style="padding:10px 14px;text-align:right;color:${discCor}" title="Meta reporta ${a.meta_conversas}, CRM tem ${a.leads}">${_esc(discTxt)}</td>
        <td style="padding:10px 14px;text-align:right">${a.fechados}</td>
        <td style="padding:10px 14px;text-align:right">${_esc(_brl2(a.receita))}</td>
        <td style="padding:10px 14px;text-align:right">${_esc(a.cpa!=null?_brl2(a.cpa):'—')}</td>
        <td style="padding:10px 14px;text-align:right;color:${roasCor};font-weight:600">${a.roas!=null?a.roas.toFixed(1)+'x':'—'}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="9" style="padding:20px;text-align:center;color:var(--muted)">Nenhum gasto ou lead no período.</td></tr>';
  } catch(e) {
    aviso.style.display=''; aviso.style.color='var(--muted)';
    aviso.textContent = 'Não foi possível carregar os dados do Meta (' + e.message + ').';
    cards.innerHTML=''; tbody.innerHTML='';
  }
}

function renderCards(t) {
  document.getElementById('cards-resumo').innerHTML = [
    ['Leads via anúncio', t.leads || 0, ''],
    ['Agendados', t.agendados || 0, ''],
    ['Fechados', t.fechados || 0, ''],
    ['Receita atribuída', _brl(t.receita), '💰'],
  ].map(([l,v]) => `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px"><div style="font-size:12px;color:var(--muted);margin-bottom:6px">${_esc(l)}</div><div style="font-size:22px;font-weight:700">${_esc(String(v))}</div></div>`).join('');
}

function renderTabela(grupos, truncado) {
  const fl = { meta: '📘 Meta', google: '🔍 Google', '-': '—' };
  if (truncado) {
    const aviso = document.getElementById('aviso-truncado') || (() => {
      const el = document.createElement('div');
      el.id = 'aviso-truncado';
      el.style.cssText = 'background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.4);border-radius:8px;padding:10px 14px;font-size:12.5px;color:#92400e;margin-bottom:12px';
      el.textContent = '⚠️ Mais de 5.000 leads no período — exibindo apenas os primeiros 5.000. Reduza o intervalo de datas para resultados completos.';
      document.getElementById('tabela-atribuicao').closest('div').before(el);
      return el;
    })();
    aviso.style.display = '';
  } else {
    const el = document.getElementById('aviso-truncado');
    if (el) el.style.display = 'none';
  }
  document.getElementById('tabela-atribuicao').innerHTML = grupos.map(g => {
    const conv = g.leads ? Math.round(g.fechados / g.leads * 100) : 0;
    const cor = conv >= 30 ? 'var(--green)' : conv >= 15 ? 'var(--text)' : 'var(--red)';
    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:10px 14px;color:var(--muted)">${_esc(fl[g.fonte]||g.fonte)}</td>
      <td style="padding:10px 14px;font-weight:500">${_esc(g.nome)}</td>
      <td style="padding:10px 14px;text-align:right">${g.leads}</td>
      <td style="padding:10px 14px;text-align:right">${g.agendados}</td>
      <td style="padding:10px 14px;text-align:right">${g.compareceu}</td>
      <td style="padding:10px 14px;text-align:right">${g.fechados}</td>
      <td style="padding:10px 14px;text-align:right">${_esc(_brl(g.receita))}</td>
      <td style="padding:10px 14px;text-align:right;color:${cor}">${conv}%</td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="padding:20px;text-align:center;color:var(--muted)">Nenhum dado no período.</td></tr>';
}

function renderCatalogo(catalog) {
  document.getElementById('catalogo-lista').innerHTML = catalog.map(a => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:8px;font-size:12.5px;flex-wrap:wrap">
      <span style="color:var(--muted);min-width:40px">${_esc(a.fonte)}</span>
      <span style="color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${_esc(a.chave)}">${_esc(a.chave)}</span>
      <span style="font-weight:600;flex:1">${_esc(a.nome)}</span>
      <span style="color:${a.ativo?'var(--green)':'var(--red)'};font-size:11px">${a.ativo?'ativo':'inativo'}</span>
      <button onclick="toggleAnuncio(${Number(a.id)},${!a.ativo})" style="padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;font-size:11px;color:var(--muted)">${a.ativo?'Desativar':'Ativar'}</button>
    </div>`).join('') || '<div style="color:var(--muted);font-size:12px;padding:8px">Nenhum anúncio catalogado ainda.</div>';
}

async function adicionarAnuncio() {
  const fonte = document.getElementById('cat-fonte').value;
  const chave = document.getElementById('cat-chave').value.trim();
  const nome = document.getElementById('cat-nome').value.trim();
  const descricao = document.getElementById('cat-desc').value.trim();
  if (!chave || !nome) return alert('Chave e nome são obrigatórios.');
  try {
    await _api('/api/anuncios', { method: 'POST', body: JSON.stringify({ fonte, chave, nome, descricao }) });
    document.getElementById('cat-chave').value = '';
    document.getElementById('cat-nome').value = '';
    document.getElementById('cat-desc').value = '';
    aplicarFiltro();
  } catch(e) { alert('Erro ao adicionar: ' + e.message); }
}

async function toggleAnuncio(id, ativo) {
  try {
    await _api('/api/anuncios/' + id, { method: 'PATCH', body: JSON.stringify({ ativo }) });
    aplicarFiltro();
  } catch(e) { alert('Erro: ' + e.message); }
}

aplicarFiltro();
</script>
</body>
</html>
