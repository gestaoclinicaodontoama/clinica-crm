<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação - Dentista | CRM AMA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"] {
  --bg: #0f1117; --bg2: #181b24; --bg3: #1e2230; --border: #2a2f42;
  --text: #e8eaf0; --muted: #6b7280; --accent: #4f8ef7; --accent-hover: #3a78e0;
  --green: #22c55e; --yellow: #f59e0b; --red: #ef4444; --orange: #f97316;
}
:root[data-theme="light"] {
  --bg: #f7f8fa; --bg2: #ffffff; --bg3: #f1f3f7; --border: #e3e6ed;
  --text: #1a1d29; --muted: #6b7280; --accent: #3b82f6; --accent-hover: #2563eb;
  --green: #16a34a; --yellow: #d97706; --red: #dc2626; --orange: #ea580c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.page-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px; height: 100vh; overflow-y: auto; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.page-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 22px; }

/* MODULE TABS */
.mod-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.mod-tab {
  padding: 10px 18px; cursor: pointer; font-size: 13.5px; font-weight: 500;
  color: var(--muted); border-bottom: 2px solid transparent;
  background: none; border-top: none; border-left: none; border-right: none;
  transition: all .15s; font-family: inherit;
}
.mod-tab:hover { color: var(--text); }
.mod-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.mod-tab[hidden] { display: none; }

/* TAB PANES */
.mod-pane { display: none; }
.mod-pane.active { display: block; }

/* BANNER MÓDULO INATIVO */
#banner-modulo-inativo {
  display: none; background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.4);
  border-radius: 10px; padding: 14px 18px; margin-bottom: 22px;
  font-size: 13px; color: var(--yellow); align-items: center; gap: 10px;
}
#banner-modulo-inativo.visible { display: flex; }

/* TOAST */
#avaliacao-toast {
  position: fixed; top: 20px; right: 20px; z-index: 9000;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast-item {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 16px; font-size: 13px; font-weight: 500; box-shadow: 0 6px 24px rgba(0,0,0,.2);
  animation: toast-in .2s ease; pointer-events: auto; max-width: 340px;
  display: flex; align-items: center; gap: 10px;
}
.toast-item.info  { border-left: 3px solid var(--accent); }
.toast-item.success { border-left: 3px solid var(--green); }
.toast-item.error { border-left: 3px solid var(--red); }
.toast-item.warning { border-left: 3px solid var(--yellow); }
@keyframes toast-in { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }

/* MODAL */
#avaliacao-modal-bg {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65);
  backdrop-filter: blur(4px); z-index: 8000; align-items: flex-start;
  justify-content: center; overflow-y: auto; padding: 40px 16px;
}
#avaliacao-modal-bg.open { display: flex; }
#avaliacao-modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
  width: 680px; max-width: 100%; padding: 28px; box-shadow: 0 16px 60px rgba(0,0,0,.35);
}
</style>
</head>
<body>

<div class="page-wrap">
  <h1>Avaliação — Dentista</h1>
  <div class="page-subtitle">Copiloto SPIN, histórico de consultas e métricas</div>

  <div id="banner-modulo-inativo" role="alert">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    Módulo desativado pela gestão. Consultas em andamento foram preservadas localmente.
  </div>

  <nav class="mod-tabs" role="tablist" aria-label="Abas do módulo Avaliação">
    <button
      class="mod-tab active"
      id="tab-btn-copiloto"
      role="tab"
      aria-selected="true"
      aria-controls="tab-copiloto"
      data-tab="copiloto"
      data-roles="dentista,admin"
    >Copiloto SPIN</button>
    <button
      class="mod-tab"
      id="tab-btn-historico"
      role="tab"
      aria-selected="false"
      aria-controls="tab-historico"
      data-tab="historico"
      data-roles="dentista,admin"
    >Histórico</button>
    <button
      class="mod-tab"
      id="tab-btn-dashboard"
      role="tab"
      aria-selected="false"
      aria-controls="tab-dashboard"
      data-tab="dashboard"
      data-roles="gestor,admin"
    >Dashboard</button>
  </nav>

  <div id="tab-copiloto" class="mod-pane active" role="tabpanel" aria-labelledby="tab-btn-copiloto">
    <div id="copiloto-root"></div>
  </div>

  <div id="tab-historico" class="mod-pane" role="tabpanel" aria-labelledby="tab-btn-historico">
    <div id="historico-root"></div>
  </div>

  <div id="tab-dashboard" class="mod-pane" role="tabpanel" aria-labelledby="tab-btn-dashboard">
    <div id="dashboard-root"></div>
  </div>
</div>

<div id="avaliacao-toast" role="region" aria-live="polite" aria-label="Notificações"></div>

<div id="avaliacao-modal-bg" role="dialog" aria-modal="true" aria-labelledby="avaliacao-modal-title">
  <div id="avaliacao-modal"></div>
</div>

<script src="/js/shared-nav.js" data-active="avaliacao-dentista"></script>
<script type="module" src="/js/avaliacao-dentista/main.js"></script>
</body>
</html>
