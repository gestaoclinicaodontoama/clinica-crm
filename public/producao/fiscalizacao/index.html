<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fiscalização — AMA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{--bg:#0f1117;--bg2:#181b24;--bg3:#1e2230;--border:#2a2f42;--text:#e8eaf0;--muted:#6b7280;--accent:#4f8ef7;--accent-hover:#3a78e0;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444}
:root[data-theme="light"]{--bg:#f7f8fa;--bg2:#ffffff;--bg3:#f1f3f7;--border:#e3e6ed;--text:#1a1d29;--muted:#6b7280;--accent:#3b82f6;--accent-hover:#2563eb;--green:#16a34a;--yellow:#d97706;--red:#dc2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{padding:16px 20px;max-width:1180px}
.page-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.page-header-left{display:flex;flex-direction:column;gap:4px}
.back-link{font-size:12px;color:var(--muted);text-decoration:none}
.back-link:hover{color:var(--accent)}
.page-header h1{font-size:20px;font-weight:700}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.controls input[type=date]{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 8px;font-family:inherit;font-size:13px}
.controls .sep{color:var(--muted);font-size:12px}
.btn{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}
.btn-ghost:disabled{opacity:.5;cursor:default}
.btn-primario{background:var(--accent);color:#fff}
.btn-primario:hover{background:var(--accent-hover)}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.section-header{padding:12px 16px;font-weight:600;font-size:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px}
.section-header .count{font-size:12px;color:var(--muted);font-weight:400}
.section-body{padding:14px 16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);text-align:left;padding:8px 16px;border-bottom:1px solid var(--border)}
td{padding:8px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tfoot td{font-weight:600;border-top:2px solid var(--border);border-bottom:none;background:var(--bg3)}
tr.sev-atencao td{background:rgba(245,158,11,.10)}
tr.sev-critico td{background:rgba(239,68,68,.13)}
.empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}
.footer-note{font-size:11px;color:var(--muted);margin:8px 2px 24px}
.honest-note{font-size:11px;color:var(--muted);padding:10px 16px;border-top:1px solid var(--border);background:var(--bg3)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}
.selo{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap;margin-left:4px}
.sel-part{background:rgba(100,116,139,.15);color:#475569}
.sel-conv{background:rgba(13,148,136,.15);color:#0d9488}
.sel-mist{background:rgba(109,40,217,.14);color:#6d28d9}
.delta-pos{color:var(--red);font-weight:600}
.delta-neg{color:var(--green)}
.tag-estouro{color:var(--red);font-weight:600;font-size:11px;margin-left:4px}
.barrinha{display:inline-block;width:70px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;vertical-align:middle;margin-right:6px}
.barrinha-fill{height:100%;background:var(--accent)}
.barrinha-fill.baixa{background:var(--yellow)}
.barrinha-fill.critica{background:var(--red)}
.pct-baixa{color:var(--yellow);font-weight:600}
.pct-critica{color:var(--red);font-weight:600}
.config-form{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;padding:14px 16px}
.config-field{display:flex;flex-direction:column;gap:4px}
.config-field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.config-field input{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 8px;font-family:inherit;font-size:13px;width:140px}
.config-readonly{padding:14px 16px;font-size:13px;color:var(--text);display:flex;gap:24px;flex-wrap:wrap}
.config-readonly b{font-weight:700}
.config-msg{font-size:12px;margin-left:8px}
.config-msg.ok{color:var(--green)}
.config-msg.erro{color:var(--red)}
</style>
</head>
<body>
<div class="wrap">

  <div class="page-header">
    <div class="page-header-left">
      <a href="/producao/" class="back-link">← Receita × Entrega</a>
      <h1>Fiscalização — Planejado × Real</h1>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-ghost" onclick="mudarJanela(-1)">◀</button>
    <input type="date" id="fromInput" onchange="carregar()">
    <span class="sep">até</span>
    <input type="date" id="toInput" onchange="carregar()">
    <button class="btn btn-ghost" id="nextBtn" onclick="mudarJanela(1)">▶</button>
  </div>

  <div class="section" id="configSection">
    <div class="section-header">Configuração</div>
    <div id="configBody" class="config-form"><span class="spinner"></span></div>
  </div>

  <div class="section" id="coberturaSection">
    <div class="section-header">Cobertura de registro <span class="count" id="coberturaCount"></span></div>
    <div id="coberturaBody"><div class="empty"><span class="spinner"></span></div></div>
  </div>

  <div class="section" id="planoSection">
    <div class="section-header">Planejado × Real <span class="count" id="planoCount"></span></div>
    <div id="planoBody"><div class="empty"><span class="spinner"></span></div></div>
    <div class="honest-note">
      Custo de CADEIRA (tempo real × valor da hora clínica). A margem completa — com laboratório,
      imposto e profissional — vem numa próxima camada.
    </div>
  </div>

</div>

<script src="/js/producao-fiscalizacao/app.js"></script>
<script src="/js/shared-nav.js" data-active="producao-fiscalizacao"></script>
</body>
</html>
