<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Social Media — CRM AMA</title>
<style>
:root { --bg:#0f1115; --bg2:#171a21; --bg3:#1f2330; --border:#2a2f3d; --text:#e8eaf0; --muted:#8b93a7;
  --accent:#4f8ef7; --green:#22c55e; --red:#ef4444; --yellow:#f59e0b; --roxo:#a78bfa; }
[data-theme="light"] { --bg:#f5f6f8; --bg2:#fff; --bg3:#eef0f4; --border:#d9dde6; --text:#1c2333; --muted:#5d6578; }
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 system-ui,Segoe UI,Roboto,sans-serif}
.sm-wrap{max-width:1280px;margin:0 auto;padding:18px 22px 60px}
.sm-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
h1{font-size:19px;margin:0 8px 0 0}
button,.btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;cursor:pointer;font:inherit}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-ghost{background:transparent}
.pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11.5px;font-weight:600}
.p-rascunho{background:color-mix(in srgb,var(--muted) 22%,transparent);color:var(--muted)}
.p-aguardando_aprovacao{background:color-mix(in srgb,var(--yellow) 22%,transparent);color:var(--yellow)}
.p-aprovado{background:color-mix(in srgb,var(--accent) 22%,transparent);color:var(--accent)}
.p-publicado{background:color-mix(in srgb,var(--green) 22%,transparent);color:var(--green)}
.p-cancelado{background:color-mix(in srgb,var(--red) 18%,transparent);color:var(--red)}
.perfil-ama{background:color-mix(in srgb,var(--green) 20%,transparent);color:var(--green)}
.perfil-dr_marcos{background:color-mix(in srgb,var(--roxo) 22%,transparent);color:var(--roxo)}
.semana{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.dia{background:var(--bg2);border:1px solid var(--border);border-radius:10px;min-height:130px;padding:8px}
.dia h4{margin:0 0 6px;font-size:12px;color:var(--muted);font-weight:600;text-transform:capitalize}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 8px;margin-bottom:6px;cursor:pointer}
.card .t{font-weight:600;font-size:12.5px;margin:3px 0}
.card .h{font-size:11px;color:var(--muted)}
.sug{background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid var(--accent);border-radius:10px;padding:10px 12px;margin:10px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;max-width:640px;width:100%;padding:18px}
.modal h3{margin:0 0 12px}
.frm{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frm label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
.frm input,.frm select,.frm textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:7px 9px;font:inherit}
.frm .full{grid-column:1/-1}
.acoes{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.redes{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.rede{font-size:11px;border:1px solid var(--border);border-radius:6px;padding:2px 7px;cursor:pointer;color:var(--muted)}
.rede.on{border-color:var(--green);color:var(--green)}
.msg{color:var(--muted);padding:30px;text-align:center}
@media (max-width:900px){ .semana{grid-template-columns:1fr 1fr} .frm{grid-template-columns:1fr} }
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{border-radius:8px 8px 0 0;border-bottom:none;opacity:.65}
.tab.on{opacity:1;background:var(--bg2);border-color:var(--accent)}
.dsp-destaques{display:flex;flex-direction:column;gap:6px;margin:10px 0}
.dsp-destaques div{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
table.dsp{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;font-size:12.5px}
table.dsp th,table.dsp td{padding:7px 9px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
table.dsp th{cursor:pointer;color:var(--muted);user-select:none}
table.dsp th:first-child,table.dsp td:first-child{text-align:left;white-space:normal}
.selo{display:inline-block;margin-left:5px;padding:0 5px;border-radius:6px;font-size:10.5px;font-weight:700;background:color-mix(in srgb,var(--green) 22%,transparent);color:var(--green)}
.dsp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:8px;margin:10px 0}
.dsp-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.dsp-card h5{margin:0 0 6px;font-size:12px;color:var(--muted)}
.dsp-muted{color:var(--muted);font-size:12px}
.pauta-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.pauta-card .meta{font-size:11.5px;color:var(--muted);margin-bottom:4px}
.pauta-card .just{font-size:12px;color:var(--muted);margin-top:4px}
.ia-box{background:var(--bg2);border:1px solid var(--accent);border-radius:10px;padding:12px 14px;margin:12px 0}
.ia-box h5{margin:0 0 8px;font-size:12.5px;color:var(--accent)}
</style>
</head>
<body>
<main class="sm-wrap" id="app">
  <div class="sm-top">
    <h1>📱 Social Media</h1>
    <button id="bt-prev">◀</button><span id="lbl-semana"></span><button id="bt-prox">▶</button>
    <button id="bt-hoje" class="btn-ghost">hoje</button>
    <span style="flex:1"></span>
    <button id="bt-novo" class="btn-primary">+ Novo post</button>
    <button id="bt-sync" title="Buscar métricas novas do Instagram">🔄 Atualizar dados</button>
    <button id="bt-cfg">⚙️</button>
  </div>
  <div class="tabs">
    <button class="tab on" data-tab="calendario">📅 Calendário</button>
    <button class="tab" data-tab="desempenho">📊 Desempenho</button>
  </div>
  <section id="tab-calendario">
    <div id="sugestoes"></div>
    <div id="grade" class="semana"></div>
    <div id="vazio" class="msg" style="display:none">Nenhum post nesta semana — clique em “+ Novo post”.</div>
  </section>
  <section id="tab-desempenho" style="display:none">
    <div class="sm-top" style="margin-bottom:6px">
      <select id="dsp-perfil">
        <option value="dr_marcos">Dr. Marcos (25–45/Invisalign)</option>
        <option value="ama">Clínica AMA (45+/protocolo)</option>
      </select>
      <button id="dsp-modo-tatico" class="tab on">Tática</button>
      <button id="dsp-modo-mensal" class="tab" style="display:none">Mensal</button>
      <span style="flex:1"></span>
      <span class="dsp-muted" id="dsp-nota"></span>
    </div>
    <div id="dsp-tatico">
      <div class="sm-top" style="margin:0 0 8px">
        <button id="bt-pauta" class="btn-primary">🤖 Sugerir pauta</button>
        <button id="bt-pauta-refresh" title="Gerar de novo (ignora o cache de 24h)">🔄</button>
      </div>
      <div id="dsp-pauta"></div>
      <div class="dsp-destaques" id="dsp-destaques"></div>
      <div id="dsp-tabela"></div>
      <div class="dsp-grid" id="dsp-agregados"></div>
      <div id="dsp-radar"></div>
    </div>
    <div id="dsp-mensal" style="display:none"></div>
  </section>
</main>

<div class="modal-bg" id="modal-post-bg"><div class="modal">
  <h3 id="mp-titulo">Novo post</h3>
  <div class="frm">
    <label>Data e hora<input type="datetime-local" id="f-data"></label>
    <label>Perfil<select id="f-perfil"><option value="ama">Clínica AMA (45+/protocolo)</option><option value="dr_marcos">Dr. Marcos (25–45/Invisalign)</option></select></label>
    <label class="full">Título<input id="f-titulo" placeholder="Reel Maçã — mordida de volta"></label>
    <label>Formato<select id="f-formato"><option>reel</option><option>carrossel</option><option>foto</option><option>story</option></select></label>
    <label>Tema<select id="f-tema"><option value="">— sem tema —</option><option value="depoimento">Depoimento</option><option value="educativo">Educativo</option><option value="oferta">Oferta</option><option value="bastidor">Bastidor</option><option value="institucional">Institucional</option></select></label>
    <label>Link do Drive<input id="f-drive" placeholder="https://drive.google.com/..."></label>
    <label class="full">Legenda<textarea id="f-legenda" rows="5"></textarea></label>
    <label class="full">Hashtags<textarea id="f-hashtags" rows="2"></textarea></label>
    <label class="full">Observações<textarea id="f-obs" rows="2"></textarea></label>
  </div>
  <div id="mp-status"></div>
  <div class="acoes" id="mp-acoes"></div>
</div></div>

<div class="modal-bg" id="modal-cfg-bg"><div class="modal">
  <h3>⚙️ Parâmetros</h3>
  <label style="display:flex;gap:8px;align-items:center;cursor:pointer">
    <input type="checkbox" id="cfg-aprovacao"> Exigir aprovação de gestor antes de publicar
  </label>
  <div id="cfg-perfis" style="margin-top:12px;color:var(--muted);font-size:12.5px"></div>
  <label style="display:block;margin-top:12px;font-size:12px;color:var(--muted)">📡 Perfis de referência (um @ por linha, máx. 10)
    <textarea id="cfg-radar" rows="4" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:7px 9px;font:inherit"></textarea>
  </label>
  <div id="cfg-radar-status" style="font-size:12px;color:var(--muted);margin-top:4px"></div>
  <div class="acoes"><button class="btn-primary" id="cfg-salvar">Salvar</button><button id="cfg-fechar">Fechar</button></div>
</div></div>

<script src="/js/social-media/api.js"></script>
<script src="/js/social-media/app.js"></script>
<script src="/js/shared-nav.js" data-active="social-media"></script>
</body>
</html>
