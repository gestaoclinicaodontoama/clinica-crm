<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard Comercial — CRM AMA</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
  :root[data-theme="dark"] {
    --bg: #0f1117; --bg2: #181b24; --bg3: #1e2230; --border: #2a2f42;
    --text: #e8eaf0; --muted: #6b7280; --accent: #4f8ef7; --accent-hover: #3a78e0;
    --green: #22c55e; --yellow: #f59e0b; --red: #ef4444; --orange: #f97316;
  }
  :root[data-theme="light"] {
    --bg: #f7f8fa; --bg2: #ffffff; --bg3: #f1f3f7; --border: #e3e6ed;
    --text: #1a1d29; --muted: #6b7280; --accent: #3b82f6; --accent-hover: #2563eb;
    --green: #16a34a; --yellow: #d97706; --red: #dc2626; --orange: #ea580c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .filtros { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:22px; }
  .filtros label { display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--muted); font-weight:500; }
  .filtros input, .filtros select {
    padding:7px 10px; border-radius:8px; border:1px solid var(--border);
    background:var(--bg2); color:var(--text); font-size:13px; font-family:inherit;
  }
  .filtros button {
    padding:8px 16px; border-radius:8px; border:none; background:var(--accent); color:#fff;
    font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:background .15s;
  }
  .filtros button:hover { background:var(--accent-hover); }
  /* KPIs */
  .kpis { display:flex; gap:14px; flex-wrap:wrap; margin:18px 0; }
  .kpi { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:14px 18px; min-width:150px; }
  .kpi-rotulo { font-size:11.5px; color:var(--muted); }
  .kpi-valor { font-size:22px; font-weight:700; margin-top:4px; letter-spacing:-.3px; }
  .kpi-delta { font-size:12px; margin-top:3px; }
  .kpi-delta.up { color:var(--green); } .kpi-delta.down { color:var(--red); }
  /* Funil */
  .funil { display:flex; gap:8px; flex-wrap:wrap; margin:18px 0; }
  .etapa { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; flex:1; min-width:120px; }
  .etapa b { font-size:12.5px; font-weight:600; color:var(--muted); }
  .etapa .n { display:block; font-size:20px; font-weight:700; margin:2px 0; }
  .etapa .conv { font-size:11px; color:var(--muted); }
  .etapa .aviso { color:var(--yellow); cursor:help; }
  .etapa.gargalo { border-color:var(--red); box-shadow:0 0 0 1px var(--red) inset; }
  /* Gráficos */
  .graf { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; margin:18px 0; max-width:900px; }
  </style>
  <script src="/js/shared-nav.js" data-active="comercial" defer></script>
  <!-- Chart.js vendorizado localmente (baixar quando a rede estabilizar):
       curl -fsSL https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js -o public/js/vendor/chart.umd.min.js -->
  <script src="/js/vendor/chart.umd.min.js"></script>
</head>
<body class="crm-shell">
<main style="flex:1;padding:28px 32px;overflow-y:auto;max-width:1100px">
  <h1 style="font-size:20px;font-weight:700;margin:0 0 6px">Dashboard Comercial</h1>
  <p style="font-size:12.5px;color:var(--muted);margin:0 0 20px">CRM Antigo · funil por coorte · histórico até maio/2026</p>

  <div class="filtros">
    <label>Período
      <select id="f-preset">
        <option value="hoje">Hoje</option>
        <option value="7d">7 dias</option>
        <option value="30d" selected>30 dias</option>
        <option value="mes">Este mês</option>
        <option value="custom">Personalizado</option>
      </select>
    </label>
    <label>De <input type="date" id="f-from" disabled></label>
    <label>Até <input type="date" id="f-to" disabled></label>
    <label>Origem
      <select id="f-origem"><option value="all">Todas as origens</option></select>
    </label>
    <button id="f-aplicar">Aplicar</button>
  </div>

  <div id="kpis" class="kpis"></div>
  <div id="funil" class="funil"></div>
  <div class="graf"><canvas id="g-tendencia"></canvas></div>
  <div class="graf"><canvas id="g-dow"></canvas></div>

  <script src="/comercial/dashboard.js"></script>
</main>
</body>
</html>
