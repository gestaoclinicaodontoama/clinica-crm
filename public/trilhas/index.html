<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trilhas de Tratamento — AMA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"] {
  --bg: #0f1117; --bg2: #181b24; --bg3: #1e2230; --border: #2a2f42;
  --text: #e8eaf0; --muted: #6b7280; --accent: #4f8ef7; --accent-hover: #3a78e0;
  --green: #22c55e; --yellow: #f59e0b; --red: #ef4444; --teal: #14b8a6; --purple: #a855f7;
}
:root[data-theme="light"] {
  --bg: #f7f8fa; --bg2: #ffffff; --bg3: #f1f3f7; --border: #e3e6ed;
  --text: #1a1d29; --muted: #6b7280; --accent: #3b82f6; --accent-hover: #2563eb;
  --green: #16a34a; --yellow: #d97706; --red: #dc2626; --teal: #0d9488; --purple: #9333ea;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.pac-wrap { padding: 20px 24px; }

.pac-beta {
  display: inline-block; margin-left: 8px; padding: 2px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 700; background: rgba(168,85,247,.14); color: var(--purple);
  vertical-align: middle; letter-spacing: .5px;
}

/* ── Tabs ── */
.pac-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 18px; align-items: center; }
.pac-tab {
  padding: 9px 20px; font-size: 13.5px; font-weight: 600; cursor: pointer;
  border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all .15s; font-family: inherit;
}
.pac-tab:hover { color: var(--text); }
.pac-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Filtros ── */
.pac-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.pac-header select {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; background: var(--bg2); color: var(--text);
  font-family: inherit; cursor: pointer; outline: none;
}
.pac-header select:focus { border-color: var(--accent); }
.pac-count { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; }

/* ── Tabela ── */
.pac-table-wrap {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  overflow: auto; max-height: calc(100vh - 215px);
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.pac-table-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
.pac-table-wrap::-webkit-scrollbar-track { background: transparent; }
.pac-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
.pac-table-wrap::-webkit-scrollbar-thumb:hover { background: var(--muted); }
.pac-table-wrap::-webkit-scrollbar-corner { background: transparent; }
/* border-collapse: separate p/ o cabeçalho sticky levar a borda junto ao rolar */
table.pac { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 12.5px; }

table.pac th {
  padding: 8px 7px; text-align: left; font-size: 10.5px; font-weight: 600;
  color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap;
  background: var(--bg2); text-transform: uppercase; letter-spacing: .4px;
  user-select: none;
  position: sticky; top: 0; z-index: 2;
}
table.pac th.sortable { cursor: pointer; }
table.pac th.sortable:hover { color: var(--text); }
table.pac th .sort-icon { margin-left: 4px; opacity: .4; font-style: normal; }
table.pac th.sort-asc .sort-icon,
table.pac th.sort-desc .sort-icon { opacity: 1; color: var(--accent); }

table.pac td { padding: 7px 7px; border-bottom: 1px solid var(--border); vertical-align: top; }
table.pac tr:last-child td { border-bottom: none; }
table.pac tr:hover td { background: var(--bg3); }

td.td-date { white-space: nowrap; font-size: 11.5px; color: var(--muted); }
td.td-text { white-space: normal; word-break: break-word; line-height: 1.35; }
th.col-pp,  td.col-pp  { min-width: 130px; }
th.col-obs, td.col-obs { min-width: 200px; }
th.col-plano, td.col-plano { min-width: 140px; }

/* ── Prioridade ── */
.pac-prio-cell { text-align: center; cursor: pointer; width: 42px; }
.pac-prio-num {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 28px; height: 26px; padding: 0 5px; border-radius: 6px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  transition: border-color .12s;
}
.pac-prio-num:hover { border-color: var(--accent); }
.pac-prio-num.p0    { background: rgba(239,68,68,.13);  color: var(--red);    border-color: transparent; }
.pac-prio-num.p-alta  { background: rgba(34,197,94,.13);  color: var(--green);  border-color: transparent; font-size: 10px; }
.pac-prio-num.p-altac { background: rgba(20,184,166,.13); color: var(--teal);   border-color: transparent; font-size: 10px; }
.pac-prio-input {
  width: 44px; padding: 3px 4px; border: 1px solid var(--accent); border-radius: 5px;
  font-size: 12px; font-weight: 700; text-align: center;
  background: var(--bg3); color: var(--text); font-family: inherit; outline: none;
}

/* ── Status / chips ── */
.pac-status {
  display: inline-block; padding: 2px 8px; border-radius: 12px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.pac-status.critico   { background: rgba(239,68,68,.12);  color: var(--red); }
.pac-status.atencao   { background: rgba(245,158,11,.12); color: var(--yellow); }
.pac-status.em-dia    { background: rgba(34,197,94,.12);  color: var(--green); }
.pac-status.sem-data  { background: var(--bg3); color: var(--muted); }
.pac-status.alta      { background: rgba(34,197,94,.12);  color: var(--green); }
.pac-status.alta-c    { background: rgba(20,184,166,.12); color: var(--teal); }

.fin-chip {
  display: inline-block; padding: 2px 7px; border-radius: 12px;
  font-size: 10.5px; font-weight: 600; white-space: nowrap;
}
.fin-chip.venc    { background: rgba(239,68,68,.12);  color: var(--red); }
.fin-chip.em-dia  { background: rgba(34,197,94,.12);  color: var(--green); }
.fin-chip.quitado { background: rgba(20,184,166,.12); color: var(--teal); }
.fin-chip.nd      { background: var(--bg3); color: var(--muted); }
.fin-alert { font-size: 11px; color: var(--yellow); display: block; margin-top: 3px; white-space: nowrap; }

.pac-novo {
  display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 10px;
  font-size: 10px; font-weight: 700; background: rgba(79,142,247,.14); color: var(--accent);
}
a.pac-perfil { color: inherit; text-decoration: none; }
a.pac-perfil:hover { color: var(--accent); text-decoration: underline; }

/* ── Células editáveis ── */
.pac-cell-edit { cursor: pointer; }
.pac-cell-edit:hover { background: rgba(99,102,241,.06); border-radius: 4px; }
.pac-edit-input, .pac-edit-select {
  width: 100%; padding: 3px 6px; border: 1px solid var(--accent);
  border-radius: 4px; font-size: 12px; background: var(--bg3);
  color: var(--text); font-family: inherit; outline: none;
}
.sug { color: var(--muted); font-style: italic; }

.pac-dias { font-weight: 600; font-size: 13px; }
.pac-dias.over { color: var(--red); }

.pac-wpp {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; background: #25D366; color: #fff;
  border-radius: 8px; text-decoration: none; font-size: 14px;
}
.pac-wpp:hover { opacity: .85; }

.pac-act {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
  background: var(--bg3); border: 1px solid var(--border); color: var(--muted);
  font-size: 13px; font-family: inherit; transition: all .12s;
}
.pac-act:hover { border-color: var(--accent); color: var(--accent); }
.pac-act.del:hover { border-color: var(--red); color: var(--red); }
.pac-act:disabled { opacity: .4; cursor: default; }
td.td-acts { white-space: nowrap; }
td.td-acts .pac-act { margin-right: 3px; }

.pac-sync {
  padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; background: var(--bg2); color: var(--text);
  font-family: inherit; cursor: pointer; transition: all .12s; white-space: nowrap;
}
.pac-sync:hover { border-color: var(--accent); color: var(--accent); }
.pac-sync:disabled { opacity: .55; cursor: default; }
.pac-sync.primario { background: var(--accent); border-color: var(--accent); color: #fff; }
.pac-sync.primario:hover { background: var(--accent-hover); color: #fff; }

#pacMsg { padding: 40px; color: var(--muted); text-align: center; }

/* ── Excluídos ── */
#excluidosBox { margin-top: 18px; }
#excluidosBox summary {
  cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted);
  user-select: none; padding: 6px 2px;
}
#excluidosBox summary:hover { color: var(--text); }
.exc-restore {
  padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 12px;
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  font-family: inherit; transition: all .12s; white-space: nowrap;
}
.exc-restore:hover { border-color: var(--green); color: var(--green); }
.exc-restore:disabled { opacity: .4; cursor: default; }

/* ── Planejamento: selo + status do plano (coluna + drawer) ── */
.selo { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; white-space: nowrap; margin-right: 4px; }
.sel-part { background: rgba(100,116,139,.15); color: #475569; }
.sel-conv { background: rgba(13,148,136,.15); color: #0d9488; }
.sel-mist { background: rgba(109,40,217,.14); color: #6d28d9; }
.tag-origem { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-left: 4px; background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
.status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 600; white-space: nowrap; }
.status-sem { background: rgba(245,158,11,.14); color: var(--yellow); }
.status-planejado { background: rgba(79,142,247,.14); color: var(--accent); }
.status-andamento { background: rgba(79,142,247,.14); color: var(--accent); }
.status-concluido { background: rgba(34,197,94,.14); color: var(--green); }
.status-descartado, .status-cancelado { background: var(--bg3); color: var(--muted); }

/* ── Botões (drawer / diálogo de planejamento — compartilhados com /trilhas/app.js e o editor) ── */
.btn { padding: 6px 14px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all .15s; }
.btn-ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-ghost:disabled { opacity: .5; cursor: default; }
.btn-primario { background: var(--accent); color: #fff; }
.btn-primario:hover { background: var(--accent-hover); }

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty, .vazio { padding: 24px; text-align: center; color: var(--muted); font-size: 13px; }

/* drawer (trilha do tratamento) */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; z-index: 40; }
.overlay.show { display: block; }
.drawer { position: fixed; top: 0; right: -440px; width: 420px; max-width: 92vw; height: 100vh; background: var(--bg2); border-left: 1px solid var(--border); overflow-y: auto; transition: right .25s ease; z-index: 50; padding: 20px; }
.drawer.open { right: 0; }
.drawer-close { float: right; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; }
.drawer h2 { font-size: 17px; margin-bottom: 2px; padding-right: 24px; }
.drawer .sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
.drawer .recado { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 12px; margin-bottom: 16px; white-space: pre-wrap; }
.drawer .proximo { background: rgba(79,142,247,.08); border: 1px solid var(--accent); border-radius: 8px; padding: 10px 12px; font-size: 12px; margin-bottom: 16px; }
.drawer .proximo b { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .3px; color: var(--accent); margin-bottom: 3px; }
.item-bloco { margin-bottom: 18px; }
.item-bloco h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.item-bloco .rotulo-sublote { font-size: 11px; color: var(--muted); font-weight: 400; }
.stepper { list-style: none; }
.stepper li { position: relative; padding: 0 0 16px 24px; font-size: 12px; }
.stepper li:last-child { padding-bottom: 0; }
.stepper li::before { content: ''; position: absolute; left: 5px; top: 2px; width: 9px; height: 9px; border-radius: 50%; background: var(--border); border: 2px solid var(--bg2); z-index: 1; }
.stepper li::after { content: ''; position: absolute; left: 9px; top: 11px; bottom: 0; width: 1px; background: var(--border); }
.stepper li:last-child::after { display: none; }
.stepper li.done::before { background: var(--green); }
.stepper li.current::before { background: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,.25); }
.stepper li .desc { font-weight: 600; }
.stepper li.done .desc { color: var(--muted); text-decoration: line-through; }
.stepper li.current .desc { color: var(--accent); }
.stepper li .meta { color: var(--muted); font-size: 11px; margin-top: 2px; }
.drawer footer { margin-top: 20px; display: flex; gap: 8px; flex-wrap: wrap; }

/* diálogos (busca de paciente + editor de plano compartilhado) */
dialog { background: var(--bg2); color: var(--text); border: 1px solid var(--border); border-radius: 12px; padding: 20px; max-width: 720px; width: 92vw; max-height: 88vh; overflow: auto; }
dialog::backdrop { background: rgba(0,0,0,.5); }
dialog h2 { font-size: 18px; margin-bottom: 8px; }
dialog label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; font-weight: 600; }
dialog input[type=text], dialog input:not([type]), dialog input[type=number], dialog select, dialog textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 7px; padding: 6px 8px; font-family: inherit; font-size: 13px; }
dialog textarea { min-height: 60px; resize: vertical; }
.espelho { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.espelho small { display: block; margin-top: 2px; }
fieldset { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-top: 12px; }
fieldset legend { font-size: 13px; font-weight: 600; padding: 0 4px; }
.item-mover { float: right; display: inline-flex; gap: 4px; }
.item-mover button { border: 1px solid var(--border, #ccc); background: transparent; color: var(--text); border-radius: 6px; cursor: pointer; font-size: 11px; line-height: 1; padding: 2px 6px; }
.etapas { list-style: none; margin: 8px 0; }
.etapas li { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; font-size: 12px; }
.etapas li .et-desc { flex: 2; }
.etapas li .et-prof { flex: 1; }
.etapas li em { color: var(--muted); font-style: normal; font-size: 11px; }
.etapas li button.et-rm { background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; padding: 0 4px; }
fieldset .add-etapa, fieldset .dividir, fieldset .aplicar-padrao, fieldset .salvar-padrao { margin-top: 6px; font-size: 11px; padding: 4px 8px; }
fieldset .aplicar-padrao:disabled, fieldset .salvar-padrao:disabled { opacity: .5; cursor: not-allowed; }
dialog footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }

/* + Adicionar paciente */
.busca-resultado { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
.busca-resultado .nome { font-weight: 600; font-size: 13px; }
.busca-resultado .fone { color: var(--muted); font-size: 11px; margin-bottom: 6px; }
.orc-linha { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 0; border-top: 1px solid var(--border); font-size: 12px; }
.orc-linha:first-of-type { border-top: none; }
.link-manual { display: inline-block; margin-top: 10px; font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: underline; background: none; border: none; font-family: inherit; padding: 0; }
</style>
</head>
<body>
<script src="/js/shared-nav.js" data-active="trilhas"></script>
<div class="main-content">
<div class="pac-wrap">

  <div class="pac-tabs">
    <button class="pac-tab active" data-tab="geral" onclick="switchTab('geral')">Geral</button>
    <button class="pac-tab" data-tab="invisalign" onclick="switchTab('invisalign')">💎 Invisalign</button>
    <span class="pac-beta" title="Página das Trilhas de Tratamento — mesma base do Pacientes 2, com a coluna de Planejamento">TRILHAS</span>
  </div>

  <div class="pac-header">
    <select id="fPrioridade" onchange="renderTable()">
      <option value="">Todas as prioridades</option>
      <option value="0">0 – Urgente</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9 – Alta</option>
      <option value="10">10 – Alta Consulta</option>
    </select>
    <select id="fStatus" onchange="renderTable()">
      <option value="">Todos os status</option>
      <option value="critico">🔴 Crítico</option>
      <option value="atencao">🟡 Atenção</option>
      <option value="em-dia">🟢 Em dia / Agendado</option>
      <option value="sem-data">⚪ Sem data</option>
      <option value="alta">✅ Alta</option>
      <option value="alta-c">🔵 Alta Consulta</option>
    </select>
    <select id="fFin" onchange="renderTable()">
      <option value="">💰 Financeiro: todos</option>
      <option value="venc">🔴 Com vencido</option>
      <option value="em-dia">🟢 Em dia (parcelas)</option>
      <option value="quitado">✅ Quitado</option>
    </select>
    <select id="fAgenda" onchange="renderTable()">
      <option value="">📅 Agenda: todos</option>
      <option value="sem">⚠️ Sem consulta futura</option>
      <option value="com">📅 Com consulta futura</option>
    </select>
    <select id="fTratamento" onchange="renderTable()"><option value="">Todos os tratamentos</option></select>
    <select id="fExecutor" onchange="renderTable()"><option value="">Todos os executores</option></select>
    <button id="syncBtn" class="pac-sync" onclick="syncNow()" title="Puxa agora os dados do Clinicorp (agenda, financeiro, visitas) — sem isso, atualizam sozinhos 1x por dia às 02h">🔄 Atualizar dados</button>
    <button id="btAdicionar" class="pac-sync primario" title="Incluir manualmente um paciente/orçamento na trilha de planejamento">+ Adicionar paciente</button>
    <span class="pac-count" id="pacCount"></span>
  </div>

  <div id="pacMsg">Carregando...</div>
  <div class="pac-table-wrap" id="pacTableWrap" style="display:none">
    <table class="pac" id="pacTable">
      <thead id="pacThead"></thead>
      <tbody id="pacTbody"></tbody>
    </table>
  </div>

  <details id="excluidosBox" style="display:none">
    <summary>🗑 Excluídos (<span id="excCount">0</span>) — clique para ver/restaurar</summary>
    <div class="pac-table-wrap" style="max-height:320px">
      <table class="pac" style="min-width:760px">
        <thead><tr><th>Nome</th><th>Tratamento</th><th>Venda</th><th>Excluído em</th><th style="width:110px"></th></tr></thead>
        <tbody id="excTbody"></tbody>
      </table>
    </div>
  </details>
</div>
</div>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
  <button class="drawer-close" id="drawerClose">×</button>
  <div id="drawerBody"></div>
</aside>

<dialog id="dlgAdd"></dialog>

<script src="/js/pacientes2/api.js"></script>
<script>
let rows = [], config = {}, dentistas = [], activeTab = 'geral';
let sortCol = null, sortDir = 'asc';

const INVISALIGN_TRATS = new Set(['Invisalign', 'Vivera']);
// função (não const): aba aberta de um dia pro outro não pode gravar/avaliar com a data de ontem
function hoje() { return new Date().toLocaleDateString('sv-SE', { timeZone: 'America/Sao_Paulo' }); }

// ── Helpers ──────────────────────────────────────────────────────────────────

function fmtDate(d) {
  if (!d) return '—';
  const parts = String(d).slice(0, 10).split('-');
  if (parts.length !== 3) return d;
  return parts[2] + '/' + parts[1] + '/' + parts[0];
}

// dd/mm/aa — versão curta pras células (tooltip carrega a completa)
function fmtDia(d) {
  if (!d) return '—';
  const parts = String(d).slice(0, 10).split('-');
  if (parts.length !== 3) return d;
  return parts[2] + '/' + parts[1] + '/' + parts[0].slice(2);
}

function primeiroNome(s) {
  return s ? String(s).trim().split(/\s+/)[0] : s;
}

function fmtMoney(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function nomeLimpo(r) {
  return String(r.nome || '').replace(/\s*\(\d+\)\s*$/, '');
}

function resolveAba(r) {
  if (r.aba === 'geral' || r.aba === 'invisalign') return r.aba;
  return INVISALIGN_TRATS.has(r.tratamento) ? 'invisalign' : 'geral';
}

function tabRows() {
  return rows.filter(r => !r.excluido_em && resolveAba(r) === activeTab);
}

function excluidos() {
  return rows.filter(r => r.excluido_em)
    .sort((a, b) => String(b.excluido_em).localeCompare(String(a.excluido_em)));
}

// Base do "Dias": última atividade real = mais recente entre visita (Clinicorp) e contato manual
function baseAtividade(r) {
  const c = [r.ultima_visita, r.data_atualizacao].filter(Boolean).map(d => String(d).slice(0, 10));
  return c.length ? c.sort()[c.length - 1] : null;
}

function diasDesde(dateStr) {
  if (!dateStr) return null;
  return Math.max(0, Math.floor((Date.now() - new Date(dateStr + 'T12:00:00').getTime()) / 86400000));
}

function calcStatus(r) {
  const prio = (r.prioridade === undefined) ? null : r.prioridade;
  if (prio === 10) return { label: 'Alta - Consulta Realizada', cls: 'alta-c', icon: '🔵' };
  if (prio === 9 || r.is_alta) return { label: 'Alta', cls: 'alta', icon: '✅' };
  const base = baseAtividade(r);
  const dias = diasDesde(base);
  if (r.proxima_consulta && String(r.proxima_consulta).slice(0, 10) >= hoje()) {
    return { label: 'Agendado', cls: 'em-dia', icon: '🟢', dias };
  }
  if (!base) return { label: 'Sem data', cls: 'sem-data', icon: '⚪' };
  const cfg = config[r.tratamento] || { dias_atualizacao: 10 };
  if (dias > cfg.dias_atualizacao) return { label: 'Crítico', cls: 'critico', icon: '🔴', dias };
  if (dias > cfg.dias_atualizacao - 5) return { label: 'Atenção', cls: 'atencao', icon: '🟡', dias };
  return { label: 'Em dia', cls: 'em-dia', icon: '🟢', dias };
}

function finInfo(r) {
  const vencido = Number(r.fin_vencido || 0);
  const futuro  = Number(r.fin_futuro  || 0);
  const pago    = Number(r.fin_total_pago || 0);
  if (!r.clinicorp_id) return { cls: 'nd', label: '—', title: 'Sem vínculo com o Clinicorp' };
  if (vencido > 0) return { cls: 'venc', label: '🔴 ' + fmtMoney(vencido), title: 'VENCIDO: ' + fmtMoney(vencido) + (r.fin_ultimo_pgto ? ' · último pgto ' + fmtDate(r.fin_ultimo_pgto) : '') };
  if (futuro > 0)  return { cls: 'em-dia', label: '🟢 Em dia', title: 'Parcelas futuras: ' + fmtMoney(futuro) + (r.fin_ultimo_pgto ? ' · último pgto ' + fmtDate(r.fin_ultimo_pgto) : '') };
  if (pago > 0)    return { cls: 'quitado', label: '✅ Quitado', title: 'Total pago: ' + fmtMoney(pago) };
  return { cls: 'nd', label: '—', title: 'Sem lançamentos financeiros' };
}

  aguardando_planejamento: { label: '◐ Sem planejamento', cls: 'status-sem' },
  planejado:                { label: '✓ Planejado',        cls: 'status-planejado' },
  em_andamento:              { label: '▶ Em andamento',     cls: 'status-andamento' },
  concluido:                 { label: '✓ Concluído',        cls: 'status-concluido' },
  descartado:                { label: 'Sem etapas necessárias', cls: 'status-descartado' },
  cancelado:                 { label: '— cancelado',        cls: 'status-cancelado' },
};
const SELO_PGTO = {
  particular: ['Particular', 'sel-part'],
  convenio:   ['Convênio',   'sel-conv'],
  misto:      ['Misto',      'sel-mist'],
};

function planoCel(r) {
  const td = document.createElement('td');
  td.className = 'col-plano';
  if (!r.plano_id) { td.textContent = '—'; return td; }
  if (r.tipo_pagamento) {
    const [label, cls] = SELO_PGTO[r.tipo_pagamento] || [r.tipo_pagamento, 'sel-part'];
    const selo = document.createElement('span');
    selo.className = 'selo ' + cls;
    selo.textContent = label;
    td.appendChild(selo);
  }
  const info = PLANO_STATUS[r.plano_status] || { label: r.plano_status || '—', cls: 'status-descartado' };
  const badge = document.createElement('span');
  badge.className = 'status-badge ' + info.cls;
  badge.textContent = info.label;
  td.appendChild(badge);
  return td;
}

function buildHeader() {
  const cols = activeTab === 'invisalign' ? COLS_INVISALIGN : COLS_GERAL;
  const tr = document.createElement('tr');
  cols.forEach(col => {
    const th = document.createElement('th');
    if (col.width) th.style.width = col.width;
    if (col.cls) th.classList.add(col.cls);
    if (col.sortable) {
      th.classList.add('sortable');
      th.dataset.col = col.key;
      if (sortCol === col.key) th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
    th.innerHTML = col.label
      + (col.sortable ? `<i class="sort-icon">${sortCol === col.key ? (sortDir === 'asc' ? '▲' : '▼') : '⬍'}</i>` : '');
    tr.appendChild(th);
  });
  const thead = document.getElementById('pacThead');
  thead.textContent = '';
  thead.appendChild(tr);
}

function prioCel(row) {
  const td = document.createElement('td');
  td.className = 'pac-prio-cell';
  td.dataset.id = row.id;
  const prio = row.prioridade ?? null;
  const badge = document.createElement('span');
  badge.className = 'pac-prio-num';
  if (prio === 10)      { badge.classList.add('p-altac'); badge.textContent = 'Alta+'; badge.title = '10 – Alta Consulta Realizada'; }
  else if (prio === 9)  { badge.classList.add('p-alta');  badge.textContent = 'Alta';  badge.title = '9 – Alta'; }
  else if (prio === 0 || prio === null) { badge.classList.add('p0'); badge.textContent = '0'; badge.title = '0 – Urgente (clique para editar)'; }
  else { badge.textContent = prio; badge.title = 'Prioridade ' + prio + ' (clique para editar)'; }
  td.appendChild(badge);
  return td;
}

function nomeCel(r) {
  const td = document.createElement('td');
  const strong = document.createElement('strong');
  const nome = nomeLimpo(r);
  if (r.lead_id) {
    const a = document.createElement('a');
    a.className = 'pac-perfil';
    a.href = '/perfil/?id=' + r.lead_id;
    a.target = '_blank';
    a.rel = 'noopener';
    a.title = 'Abrir Perfil 360º';
    a.textContent = nome;
    strong.appendChild(a);
  } else {
    strong.textContent = nome;
  }
  td.appendChild(strong);
  if (!r.importado_historico && r.criado_em && diasDesde(String(r.criado_em).slice(0, 10)) <= 14) {
    const novo = document.createElement('span');
    novo.className = 'pac-novo';
    novo.textContent = '🆕';
    novo.title = 'Entrou pela Conferência há poucos dias — confira tratamento/executor';
    td.appendChild(novo);
  }
  return td;
}

function finCel(r) {
  const td = document.createElement('td');
  const info = finInfo(r);
  const chip = document.createElement('span');
  chip.className = 'fin-chip ' + info.cls;
  chip.textContent = info.label;
  chip.title = info.title;
  td.appendChild(chip);
  const semAgendaFutura = !r.proxima_consulta || String(r.proxima_consulta).slice(0, 10) < hoje();
  if (r.sem_checkin_ultima && semAgendaFutura && r.ultima_agenda_data) {
    const al = document.createElement('span');
    al.className = 'fin-alert';
    al.textContent = '⚠️ sem check-in ' + fmtDate(r.ultima_agenda_data);
    al.title = 'Última consulta agendada (' + fmtDate(r.ultima_agenda_data) + ') não teve check-in registrado e não há agenda futura';
    td.appendChild(al);
  }
  return td;
}

function dateCel(v, title) {
  const td = document.createElement('td');
  td.className = 'td-date';
  td.textContent = fmtDia(v);
  td.title = [title, v ? fmtDate(v) : ''].filter(Boolean).join(' · ');
  return td;
}

function editCel(rowId, field, value, isText) {
  const td = document.createElement('td');
  const isDate = field.includes('data');
  td.className = 'pac-cell-edit' + (isText ? ' td-text' : (isDate ? ' td-date' : ''));
  if (field === 'proximo_passo') td.classList.add('col-pp');
  if (field === 'obs') td.classList.add('col-obs');
  td.textContent = isDate ? fmtDia(value) : (value || '—');
  if (isDate && value) td.title = fmtDate(value);
  td.dataset.id = rowId;
  td.dataset.field = field;
  td.dataset.value = value || '';
  return td;
}

// Avaliador/Executor: valor salvo, ou sugestão da agenda (itálico); clique abre select de dentistas
function dentistaCel(r, field) {
  const td = document.createElement('td');
  td.className = 'pac-cell-edit';
  td.dataset.id = r.id;
  td.dataset.field = field;
  td.dataset.dentista = '1';
  const saved = r[field];
  const sug = field === 'avaliador'
    ? r.avaliador_sugerido
    : (r.proximo_dentista || r.ultimo_dentista);
  // exibe/grava só o primeiro nome (pedido do Luiz); dados antigos completos são encurtados na exibição
  td.dataset.saved = primeiroNome(saved) || '';
  if (saved) {
    td.textContent = primeiroNome(saved);
    td.title = saved;
    td.dataset.value = primeiroNome(saved);
  } else if (sug) {
    const s = document.createElement('span');
    s.className = 'sug';
    s.textContent = primeiroNome(sug);
    s.title = sug + ' — sugerido pela agenda do Clinicorp; clique para confirmar ou alterar';
    td.appendChild(s);
    td.dataset.value = primeiroNome(sug);
  } else {
    td.textContent = '—';
    td.dataset.value = '';
  }
  return td;
}

function diasStatusWppActs(tr, r) {
  const st = calcStatus(r);
  const dias = st.dias !== undefined && st.dias !== null ? st.dias : diasDesde(baseAtividade(r));

  const tdDias = document.createElement('td');
  tdDias.className = 'pac-dias' + (typeof dias === 'number' && dias > 0 && st.cls === 'critico' ? ' over' : '');
  tdDias.textContent = dias !== null && dias !== undefined ? dias : '—';
  tdDias.title = 'Dias desde a última atividade (visita no Clinicorp ou contato registrado)';
  tr.appendChild(tdDias);

  const span = document.createElement('span');
  span.className = 'pac-status ' + st.cls;
  span.textContent = st.icon + ' ' + st.label;
  const tdSt = document.createElement('td');
  tdSt.appendChild(span);
  tr.appendChild(tdSt);

  const tdWpp = document.createElement('td');
  tdWpp.style.textAlign = 'center';
  if (r.telefone) {
    // strip do 0 à esquerda SÓ para o link (o 0 gravado é estratégia intencional de família)
    const tel = String(r.telefone).replace(/\D/g, '').replace(/^0+/, '');
    const a = document.createElement('a');
    a.className = 'pac-wpp';
    a.href = 'https://wa.me/' + (tel.startsWith('55') && tel.length >= 12 ? tel : '55' + tel);
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.textContent = '💬';
    tdWpp.appendChild(a);
  }
  tr.appendChild(tdWpp);

  const tdActs = document.createElement('td');
  tdActs.className = 'td-acts';

  const trilha = document.createElement('button');
  trilha.className = 'pac-act';
  trilha.textContent = '🧭';
  trilha.dataset.id = r.id;
  trilha.dataset.act = 'trilha';
  trilha.dataset.plano = r.plano_id || '';
  trilha.title = r.plano_id ? 'Ver a trilha do tratamento (itens/etapas)' : 'Ainda sem planejamento vinculado';
  if (!r.plano_id) trilha.disabled = true;
  tdActs.appendChild(trilha);

  const planejar = document.createElement('button');
  planejar.className = 'pac-act';
  planejar.textContent = '📝';
  planejar.dataset.id = r.id;
  planejar.dataset.act = 'planejar';
  planejar.dataset.plano = r.plano_id || '';
  planejar.title = r.plano_id ? 'Planejar o tratamento' : 'Ainda sem planejamento vinculado';
  if (!r.plano_id) planejar.disabled = true;
  tdActs.appendChild(planejar);

  const tlink = document.createElement('button');
  tlink.className = 'pac-act';
  tlink.textContent = '🔗';
  tlink.dataset.id = r.id;
  tlink.dataset.act = 'tracker';
  tlink.dataset.plano = r.plano_id || '';
  tlink.title = r.plano_id ? 'Copiar link de acompanhamento do paciente' : 'Ainda sem planejamento vinculado';
  if (!r.plano_id) tlink.disabled = true;
  tdActs.appendChild(tlink);

  const ct = document.createElement('button');
  ct.className = 'pac-act';
  ct.textContent = '✓';
  ct.dataset.id = r.id;
  ct.dataset.act = 'contato';
  ct.title = 'Registrar contato hoje (zera os Dias)';
  tdActs.appendChild(ct);

  const target = resolveAba(r) === 'invisalign' ? 'geral' : 'invisalign';
  const mv = document.createElement('button');
  mv.className = 'pac-act';
  mv.textContent = '⇄';
  mv.dataset.id = r.id;
  mv.dataset.act = 'mover';
  mv.dataset.target = target;
  mv.title = target === 'invisalign' ? 'Mover para 💎 Invisalign' : 'Mover para Geral';
  tdActs.appendChild(mv);

  const del = document.createElement('button');
  del.className = 'pac-act del';
  del.textContent = '🗑';
  del.dataset.id = r.id;
  del.dataset.act = 'excluir';
  del.title = 'Excluir da lista (não altera o Clinicorp)';
  tdActs.appendChild(del);

  tr.appendChild(tdActs);
}

function proxConsultaCel(r) {
  const v = r.proxima_consulta ? String(r.proxima_consulta).slice(0, 10) : null;
  const td = document.createElement('td');
  td.className = 'td-date';
  if (v && v >= hoje()) {
    td.textContent = fmtDia(v);
    td.title = fmtDate(v) + (r.proximo_dentista ? ' · com ' + r.proximo_dentista : '');
  } else {
    td.textContent = '— ⚠️';
    td.title = 'Sem consulta futura no Clinicorp';
  }
  return td;
}

function makeRow(r) {
  const tr = document.createElement('tr');
  tr.dataset.id = r.id;

  if (activeTab === 'invisalign') {
    tr.appendChild(nomeCel(r));
    tr.appendChild(editCel(r.id, 'tratamento',          r.tratamento,          false));
    tr.appendChild(planoCel(r));
    tr.appendChild(editCel(r.id, 'situacao_tratamento', r.situacao_tratamento, false));
    tr.appendChild(dateCel(r.ultima_visita, 'Última visita registrada no Clinicorp'));
    tr.appendChild(proxConsultaCel(r));
    tr.appendChild(editCel(r.id, 'proximo_passo',       r.proximo_passo,       true));
    tr.appendChild(editCel(r.id, 'data_vencimento',     r.data_vencimento,     false));
    tr.appendChild(dentistaCel(r, 'executor'));
    tr.appendChild(editCel(r.id, 'obs',                 r.obs,                 true));
    tr.appendChild(finCel(r));
    diasStatusWppActs(tr, r);
    return tr;
  }

  tr.appendChild(prioCel(r));
  tr.appendChild(nomeCel(r));
  tr.appendChild(editCel(r.id, 'tratamento', r.tratamento, false));
  tr.appendChild(planoCel(r));
  tr.appendChild(dateCel(r.data_venda));
  tr.appendChild(dateCel(r.ultima_visita, 'Última visita registrada no Clinicorp'));
  tr.appendChild(proxConsultaCel(r));
  tr.appendChild(editCel(r.id, 'proximo_passo', r.proximo_passo, true));
  tr.appendChild(dentistaCel(r, 'avaliador'));
  tr.appendChild(dentistaCel(r, 'executor'));
  tr.appendChild(editCel(r.id, 'obs', r.obs, true));
  tr.appendChild(finCel(r));
  diasStatusWppActs(tr, r);
  return tr;
}

// ── Render ───────────────────────────────────────────────────────────────────

function getSortValue(row, col) {
  if (col === '_dias') {
    const d = diasDesde(baseAtividade(row));
    return d === null ? -1 : d;
  }
  if (col === '_status') return calcStatus(row).cls;
  if (col === '_fin') return Number(row.fin_vencido || 0);
  // null = sem classificação → 0 (igual à exibição e ao sort padrão), senão vai pro fim da lista
  if (col === 'prioridade') return row.prioridade ?? 0;
  // consulta no PASSADO conta como "sem agenda" (igual à exibição "— ⚠️"), senão a data velha embaralha o sort
  if (col === 'proxima_consulta') {
    const v = row.proxima_consulta ? String(row.proxima_consulta).slice(0, 10) : '';
    return v >= hoje() ? v : '';
  }
  const v = row[col];
  return v ?? '';
}

function applySort(arr) {
  if (!sortCol) {
    if (activeTab === 'geral') {
      return [...arr].sort((a, b) => {
        const pa = (a.prioridade === null || a.prioridade === undefined) ? 0 : a.prioridade;
        const pb = (b.prioridade === null || b.prioridade === undefined) ? 0 : b.prioridade;
        return pa - pb;
      });
    }
    return arr;
  }
  return [...arr].sort((a, b) => {
    let va = getSortValue(a, sortCol);
    let vb = getSortValue(b, sortCol);
    if (va === '' && vb === '') return 0;
    if (va === '') return 1;
    if (vb === '') return -1;
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return sortDir === 'asc' ? cmp : -cmp;
  });
}

function renderTable() {
  const fPrio   = document.getElementById('fPrioridade').value;
  const fStatus = document.getElementById('fStatus').value;
  const fFin    = document.getElementById('fFin').value;
  const fAgenda = document.getElementById('fAgenda').value;
  const fTrat   = document.getElementById('fTratamento').value;
  const fExec   = document.getElementById('fExecutor').value;

  let filtered = tabRows().filter(r => {
    if (fPrio !== '') {
      const pEfetivo = (r.prioridade === null || r.prioridade === undefined) ? 0 : r.prioridade;
      if (pEfetivo !== parseInt(fPrio)) return false;
    }
    if (fStatus && calcStatus(r).cls !== fStatus) return false;
    if (fFin && finInfo(r).cls !== fFin) return false;
    if (fAgenda) {
      const temFutura = !!(r.proxima_consulta && String(r.proxima_consulta).slice(0, 10) >= hoje());
      if (fAgenda === 'sem' && temFutura) return false;
      if (fAgenda === 'com' && !temFutura) return false;
    }
    if (fTrat && r.tratamento !== fTrat) return false;
    if (fExec && r.executor !== fExec) return false;
    return true;
  });

  filtered = applySort(filtered);

  document.getElementById('pacCount').textContent = `${filtered.length} paciente(s)`;
  buildHeader();
  const tbody = document.getElementById('pacTbody');
  tbody.textContent = '';
  const frag = document.createDocumentFragment();
  filtered.forEach(r => frag.appendChild(makeRow(r)));
  tbody.appendChild(frag);
}

function populateTratamentoFilter() {
  const fTrat = document.getElementById('fTratamento');
  const current = fTrat.value;
  while (fTrat.options.length > 1) fTrat.remove(1);
  [...new Set(tabRows().map(r => r.tratamento).filter(Boolean))].sort().forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    if (t === current) o.selected = true;
    fTrat.appendChild(o);
  });
}

function switchTab(tab) {
  activeTab = tab;
  sortCol = null; sortDir = 'asc';
  document.querySelectorAll('.pac-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  document.getElementById('fTratamento').value = '';
  document.getElementById('fPrioridade').style.display = tab === 'invisalign' ? 'none' : '';
  populateTratamentoFilter();
  renderTable();
}

// ── Persistência ─────────────────────────────────────────────────────────────

// PATCH devolve só os campos base (v1) — preserva os campos enriquecidos já carregados
async function salvar(id, body) {
  const updated = await Pacientes2API.atualizar(id, body);
  const idx = rows.findIndex(r => r.id === id);
  if (idx >= 0) rows[idx] = { ...rows[idx], ...updated };
}

// ── Interações ────────────────────────────────────────────────────────────────

document.getElementById('pacThead').addEventListener('click', e => {
  const th = e.target.closest('th.sortable');
  if (!th) return;
  const col = th.dataset.col;
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  renderTable();
});

document.getElementById('pacTbody').addEventListener('click', async e => {
  const actBtn = e.target.closest('.pac-act');
  if (actBtn) {
    const id = actBtn.dataset.id, act = actBtn.dataset.act;
    const row = rows.find(r => r.id === id);
    if (!row) return;

    // Trilha / Planejar: só abrem o drawer/diálogo de planejamento (não mexem na linha) — não
    // passam pelo disable-e-recarrega usado pelas ações de escrita (contato/mover/excluir).
    if (act === 'trilha') {
      if (actBtn.disabled) return;
      if (window.TrilhasUI) window.TrilhasUI.abrirDrawer(actBtn.dataset.plano);
      return;
    }
    if (act === 'planejar') {
      if (actBtn.disabled) return;
      if (window.TrilhasUI) window.TrilhasUI.abrirPlanejar(actBtn.dataset.plano);
      return;
    }
    if (act === 'tracker') {
      if (actBtn.disabled) return;
      if (window.TrilhasUI) window.TrilhasUI.copiarTracker(actBtn.dataset.plano);
      return;
    }

    actBtn.disabled = true;
    try {
      if (act === 'mover') {
        await salvar(id, { aba: actBtn.dataset.target });
      } else if (act === 'contato') {
        await salvar(id, { data_atualizacao: hoje() });
      } else if (act === 'excluir') {
        const ok = confirm('Excluir "' + nomeLimpo(row) + '" da lista?\n\nEle vai para a lista "🗑 Excluídos" no fim da página (dá para restaurar). Não altera NADA no Clinicorp.');
        if (!ok) { actBtn.disabled = false; return; }
        const resp = await Pacientes2API.excluir(id);
        row.excluido_em = resp.excluido_em || new Date().toISOString();
      }
      renderTable();
      renderExcluidos();
    } catch (err) {
      actBtn.disabled = false;
      alert('Erro: ' + err.message);
    }
    return;
  }

  // Prioridade
  const prioCell = e.target.closest('.pac-prio-cell');
  if (prioCell && !prioCell.querySelector('.pac-prio-input')) {
    const id = prioCell.dataset.id;
    const row = rows.find(r => r.id === id);
    if (!row) return;
    const badge = prioCell.querySelector('.pac-prio-num');
    const inp = document.createElement('input');
    inp.className = 'pac-prio-input';
    inp.type = 'number'; inp.min = 0; inp.max = 10;
    inp.value = (row.prioridade === null || row.prioridade === undefined) ? 0 : row.prioridade;
    prioCell.replaceChildren(inp);
    inp.focus(); inp.select();

    async function savePrio() {
      inp.removeEventListener('blur', savePrio);
      const val = Math.max(0, Math.min(10, parseInt(inp.value) || 0));
      try {
        await salvar(id, { prioridade: val, is_alta: val >= 9 });
        renderTable();
      } catch (err) {
        prioCell.replaceChildren(badge);
        alert('Erro: ' + err.message);
      }
    }
    inp.addEventListener('blur', savePrio);
    inp.addEventListener('keydown', ev => {
      if (ev.key === 'Enter')  { ev.preventDefault(); inp.blur(); }
      if (ev.key === 'Escape') { inp.removeEventListener('blur', savePrio); prioCell.replaceChildren(badge); }
    });
    return;
  }

  // Células editáveis
  const td = e.target.closest('.pac-cell-edit');
  if (!td || td.querySelector('input') || td.querySelector('select')) return;
  const { id, field, value } = td.dataset;
  const origHtml = td.innerHTML;

  // Avaliador/Executor: select com os dentistas
  if (td.dataset.dentista === '1') {
    const sel = document.createElement('select');
    sel.className = 'pac-edit-select';
    const optBlank = document.createElement('option');
    optBlank.value = ''; optBlank.textContent = '—';
    sel.appendChild(optBlank);
    // pré-seleciona só o que está SALVO; a sugestão fica como opção (escolher = confirmar)
    const savedVal = td.dataset.saved || '';
    const nomes = [...dentistas];
    if (value && !nomes.includes(value)) nomes.unshift(value);
    if (savedVal && !nomes.includes(savedVal)) nomes.unshift(savedVal);
    nomes.forEach(n => {
      const o = document.createElement('option');
      o.value = n; o.textContent = n;
      if (n === savedVal) o.selected = true;
      sel.appendChild(o);
    });
    td.textContent = '';
    td.appendChild(sel);
    sel.focus();

    let cancelled = false;
    async function saveSel() {
      sel.removeEventListener('blur', saveSel);
      if (cancelled) return;
      // dirty-check contra o valor SALVO (não contra a sugestão): abrir e clicar fora não grava nada
      if ((sel.value || '') === (td.dataset.saved || '')) { td.innerHTML = origHtml; return; }
      try {
        await salvar(id, { [field]: sel.value || null });
        renderTable();
      } catch (err) { td.innerHTML = origHtml; alert('Erro: ' + err.message); }
    }
    sel.addEventListener('change', () => sel.blur());
    sel.addEventListener('blur', saveSel);
    sel.addEventListener('keydown', ev => {
      if (ev.key === 'Escape') { cancelled = true; sel.removeEventListener('blur', saveSel); td.innerHTML = origHtml; }
    });
    return;
  }

  const inp = document.createElement('input');
  inp.className = 'pac-edit-input';
  inp.type  = field.includes('data') ? 'date' : 'text';
  inp.value = value;
  td.textContent = '';
  td.appendChild(inp);
  inp.focus();

  async function save() {
    inp.removeEventListener('blur', save);
    const val = inp.value.trim();
    try {
      await salvar(id, { [field]: val || null });
      renderTable();
    } catch (err) { td.innerHTML = origHtml; alert('Erro: ' + err.message); }
  }
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', ev => {
    if (ev.key === 'Enter')  { ev.preventDefault(); inp.blur(); }
    if (ev.key === 'Escape') { inp.removeEventListener('blur', save); td.innerHTML = origHtml; }
  });
});

// ── Excluídos (restaurar) ─────────────────────────────────────────────────────

function renderExcluidos() {
  const exc = excluidos();
  const box = document.getElementById('excluidosBox');
  document.getElementById('excCount').textContent = exc.length;
  box.style.display = exc.length ? '' : 'none';
  const tbody = document.getElementById('excTbody');
  tbody.textContent = '';
  const frag = document.createDocumentFragment();
  exc.forEach(r => {
    const tr = document.createElement('tr');
    const tdNome = document.createElement('td');
    const strong = document.createElement('strong');
    strong.textContent = nomeLimpo(r);
    tdNome.appendChild(strong);
    tr.appendChild(tdNome);
    tr.appendChild(cel(r.tratamento));
    tr.appendChild(cel(fmtDate(r.data_venda), 'td-date'));
    tr.appendChild(cel(fmtDate(r.excluido_em), 'td-date'));
    const tdBtn = document.createElement('td');
    const btn = document.createElement('button');
    btn.className = 'exc-restore';
    btn.textContent = '↩ Restaurar';
    btn.dataset.id = r.id;
    tdBtn.appendChild(btn);
    tr.appendChild(tdBtn);
    frag.appendChild(tr);
  });
  tbody.appendChild(frag);
}

function cel(text, cls) {
  const td = document.createElement('td');
  if (cls) td.className = cls;
  td.textContent = (text === undefined || text === null || text === '') ? '—' : text;
  return td;
}

document.getElementById('excTbody').addEventListener('click', async e => {
  const btn = e.target.closest('.exc-restore');
  if (!btn) return;
  const row = rows.find(r => r.id === btn.dataset.id);
  if (!row) return;
  btn.disabled = true;
  try {
    await Pacientes2API.restaurar(row.id);
    row.excluido_em = null;
    renderTable();
    renderExcluidos();
  } catch (err) {
    btn.disabled = false;
    alert('Erro ao restaurar: ' + err.message);
  }
});

// ── Init ─────────────────────────────────────────────────────────────────────

// Retry padrão do projeto p/ 5xx transitórios (swap de container): 2 novas tentativas em 1.5s/3s
async function carregarComRetry() {
  const delays = [0, 1500, 3000];
  let lastErr;
  for (const d of delays) {
    if (d) await new Promise(r => setTimeout(r, d));
    try {
      return await Promise.all([
        Pacientes2API.listar(), Pacientes2API.config(), Pacientes2API.dentistas(),
      ]);
    } catch (e) { lastErr = e; }
  }
  throw lastErr;
}

// Sync manual: dispara o sync do Clinicorp agora (sem ele, os dados vêm do sync diário das 02h)
async function syncNow() {
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Sincronizando… (pode levar uns minutos)';
  try {
    await Pacientes2API.sync();
    rows = await Pacientes2API.listar();
    renderTable();
    renderExcluidos();
    btn.textContent = '✅ Atualizado';
    setTimeout(() => { btn.textContent = '🔄 Atualizar dados'; btn.disabled = false; }, 2000);
  } catch (e) {
    alert('Erro ao sincronizar: ' + e.message);
    btn.textContent = '🔄 Atualizar dados';
    btn.disabled = false;
  }
}

// Recarrega só a lista (sem o spinner de página inteira) — chamada pelo /js/trilhas/app.js depois
// de Planejar/Adicionar paciente, para a coluna de Planejamento refletir o novo estado.
window.recarregarPacientes2 = async function () {
  rows = await Pacientes2API.listar();
  renderTable();
  renderExcluidos();
};

async function init() {
  try {
    const [data, cfg, dents] = await carregarComRetry();
    rows      = data;
    config    = Object.fromEntries(cfg.map(c => [c.tratamento, c]));
    dentistas = [...new Set(dents.map(primeiroNome))].sort();

    const fExec = document.getElementById('fExecutor');
    [...new Set(data.filter(r => !r.excluido_em).map(r => r.executor).filter(Boolean))].sort().forEach(e => {
      const o = document.createElement('option'); o.textContent = e; fExec.appendChild(o);
    });
    populateTratamentoFilter();

    document.getElementById('pacMsg').style.display = 'none';
    document.getElementById('pacTableWrap').style.display = '';
    renderTable();
    renderExcluidos();
  } catch (e) {
    document.getElementById('pacMsg').textContent = 'Erro: ' + e.message + ' — recarregue a página';
  }
}

init();
