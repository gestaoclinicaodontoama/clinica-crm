<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Financeiro — AMA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"] {
  --bg: #0f1117; --bg2: #181b24; --bg3: #1e2230; --border: #2a2f42;
  --text: #e8eaf0; --muted: #6b7280; --accent: #4f8ef7; --accent-hover: #3a78e0;
  --green: #22c55e; --yellow: #f59e0b; --red: #ef4444; --teal: #14b8a6; --purple: #a855f7;
}
:root[data-theme="light"] {
  --bg: #f7f8fa; --bg2: #ffffff; --bg3: #f1f3f7; --border: #e3e6ed;
  --text: #1a1d29; --muted: #6b7280; --accent: #3b82f6; --accent-hover: #2563eb;
  --green: #16a34a; --yellow: #d97706; --red: #dc2626; --teal: #0d9488; --purple: #9333ea;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.fin-wrap { padding: 20px 24px; }

/* ── Header ── */
.fin-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.fin-header h1 { font-size: 20px; font-weight: 700; flex: 1; min-width: 160px; }

.fin-links {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
}
.fin-link {
  padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
  text-decoration: none; color: var(--muted); background: var(--bg2);
  border: 1px solid var(--border); transition: all .15s;
}
.fin-link:hover { border-color: var(--accent); color: var(--accent); }

/* ── Controles ── */
.fin-controls {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
}
.fin-controls label { font-size: 13px; color: var(--muted); font-weight: 500; }
.fin-controls input[type="month"],
.fin-controls input[type="date"] {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; background: var(--bg2); color: var(--text);
  font-family: inherit; outline: none;
}
.fin-controls input:focus { border-color: var(--accent); }

.btn { padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all .15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: .6; cursor: default; }
.btn-ghost { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg3); }

/* ── Mensagem ── */
#dreMsg { padding: 40px; color: var(--muted); text-align: center; }

/* ── Tabela DRE ── */
.dre-wrap {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  overflow-x: auto;
}
table.dre { border-collapse: collapse; width: 100%; font-size: 13px; min-width: 400px; }

table.dre th {
  padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600;
  color: var(--muted); border-bottom: 1px solid var(--border);
  text-transform: uppercase; letter-spacing: .5px;
}
table.dre th:last-child { text-align: right; }

table.dre td { padding: 9px 14px; border-bottom: 1px solid var(--border); }
table.dre tr:last-child td { border-bottom: none; }

table.dre tr.grupo td { background: var(--bg3); font-weight: 700; font-size: 13.5px; }
table.dre tr.grupo td:last-child { text-align: right; }

table.dre tr.conta td:last-child { text-align: right; color: var(--muted); }

table.dre tr.resultado td {
  background: var(--bg3); font-weight: 700; font-size: 14px;
  border-top: 2px solid var(--border);
}
table.dre tr.resultado td:last-child { text-align: right; }

.valor-positivo { color: var(--green); }
.valor-negativo { color: var(--red); }
</style>
</head>
<body>
<script src="/js/shared-nav.js" data-active="financeiro"></script>
<div class="main-content">
<div class="fin-wrap">

  <div class="fin-header">
    <h1>Financeiro — DRE</h1>
  </div>

  <div class="fin-links">
    <a class="fin-link" href="/financeiro/a-categorizar.html">A categorizar</a>
    <a class="fin-link" href="/financeiro/lancamentos.html">Lançamentos</a>
    <a class="fin-link" href="/financeiro/cadastros.html">Cadastros</a>
  </div>

  <div class="fin-controls">
    <label for="from">De</label>
    <input type="month" id="from" />
    <label for="to">Até</label>
    <input type="month" id="to" />
    <button class="btn btn-primary" id="btnCarregar" onclick="carregar()">Ver DRE</button>
    <button class="btn btn-ghost" id="btnSync" onclick="sincronizar()">Atualizar dados</button>
  </div>

  <div id="dreMsg">Selecione o período e clique em "Ver DRE".</div>
  <div id="dreWrap" style="display:none" class="dre-wrap">
    <div id="dre"></div>
  </div>

</div>
</div>

<script src="/js/financeiro/api.js"></script>
<script>
// ── Defaults: mês corrente ────────────────────────────────────────────────────
(function () {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const ym = `${y}-${m}`;
  document.getElementById('from').value = ym;
  document.getElementById('to').value = ym;
})();

// ── Formatação BRL ────────────────────────────────────────────────────────────
function fmt(v) {
  return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function valorClass(v) {
  return Number(v) >= 0 ? 'valor-positivo' : 'valor-negativo';
}

// ── Renderizar DRE ────────────────────────────────────────────────────────────
async function carregar() {
  const fromEl = document.getElementById('from');
  const toEl = document.getElementById('to');
  const btn = document.getElementById('btnCarregar');
  const msg = document.getElementById('dreMsg');
  const wrap = document.getElementById('dreWrap');

  // Converter month input (YYYY-MM) para datas completas
  const fromDate = fromEl.value ? fromEl.value + '-01' : '';
  const toDate = toEl.value ? toEl.value + '-' + lastDayOf(toEl.value) : '';

  if (!fromDate || !toDate) {
    msg.textContent = 'Selecione o período.';
    msg.style.display = '';
    wrap.style.display = 'none';
    return;
  }

  msg.textContent = 'Carregando...';
  msg.style.display = '';
  wrap.style.display = 'none';
  btn.disabled = true;

  try {
    const dre = await FinAPI.dre(fromDate, toDate);
    let html = '<table class="dre"><thead><tr><th>Conta</th><th>Total</th></tr></thead><tbody>';

    for (const g of (dre.grupos || [])) {
      const gClass = valorClass(g.total);
      html += `<tr class="grupo"><td>${g.titulo}</td><td class="${gClass}">${fmt(g.total)}</td></tr>`;
      for (const c of (g.contas || [])) {
        html += `<tr class="conta"><td style="padding-left:28px">${c.codigo ? c.codigo + ' ' : ''}${c.nome}</td><td>${fmt(c.total)}</td></tr>`;
      }
    }

    const resClass = valorClass(dre.resultado);
    html += `<tr class="resultado"><td>RESULTADO</td><td class="${resClass}">${fmt(dre.resultado)}</td></tr>`;
    html += '</tbody></table>';

    document.getElementById('dre').innerHTML = html;
    msg.style.display = 'none';
    wrap.style.display = '';
  } catch (e) {
    msg.textContent = 'Erro ao carregar DRE: ' + e.message;
    msg.style.display = '';
    wrap.style.display = 'none';
  } finally {
    btn.disabled = false;
  }
}

// ── Sincronizar dados ─────────────────────────────────────────────────────────
async function sincronizar() {
  const btn = document.getElementById('btnSync');
  const msg = document.getElementById('dreMsg');
  const wrap = document.getElementById('dreWrap');

  btn.disabled = true;
  btn.textContent = 'Sincronizando...';
  const prevDisplay = wrap.style.display;

  try {
    await FinAPI.sync();
    btn.textContent = 'Sincronizado!';
    await carregar();
  } catch (e) {
    msg.textContent = 'Erro ao sincronizar: ' + e.message;
    msg.style.display = '';
    wrap.style.display = 'none';
  } finally {
    btn.disabled = false;
    setTimeout(() => { btn.textContent = 'Atualizar dados'; }, 2000);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function lastDayOf(ym) {
  // ym = 'YYYY-MM'
  const [y, m] = ym.split('-').map(Number);
  return new Date(y, m, 0).getDate();
}

// Carregar automaticamente ao abrir
carregar();
</script>
</body>
</html>
